<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dutodo</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='160' height='160' viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3CclipPath id='c'%3E%3Crect width='160' height='160' rx='36'/%3E%3C/clipPath%3E%3C/defs%3E%3Crect width='160' height='160' rx='36' fill='%23FFB800'/%3E%3Cg clip-path='url(%23c)'%3E%3Cpath d='M40,54 L65,88 L124,30' stroke='white' stroke-width='22' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M40,54 L65,88 L124,30' stroke='%23FFD0E4' stroke-width='11' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Ccircle cx='80' cy='118' r='44' fill='white'/%3E%3Cellipse cx='55' cy='124' rx='13' ry='8' fill='%23FFB3CC' opacity='0.65'/%3E%3Cellipse cx='105' cy='124' rx='13' ry='8' fill='%23FFB3CC' opacity='0.65'/%3E%3Ccircle cx='67' cy='108' r='5.5' fill='%232A2A2A'/%3E%3Ccircle cx='93' cy='108' r='5.5' fill='%232A2A2A'/%3E%3Ccircle cx='69' cy='106' r='2.2' fill='white'/%3E%3Ccircle cx='95' cy='106' r='2.2' fill='white'/%3E%3C/g%3E%3C/svg%3E">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f0f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-sub: #8e8e93;
    --text-muted: #c7c7cc;
    --border: #e5e5ea;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, 'Apple SD Gothic Neo', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .app {
    display: flex;
    height: 100vh;
    padding: 20px;
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .app-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 2px 4px 4px;
  }

  .app-logo-text {
    display: flex;
    flex-direction: column;
  }

  .app-logo-name {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }

  .app-logo-slogan {
    font-size: 10px;
    color: #E09A00;
    font-weight: 600;
    margin-top: 3px;
    letter-spacing: 0.3px;
  }

  .panel-left {
    width: 380px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panel-right {
    flex: 1;
    min-width: 0;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    padding-right: 2px;
  }

  .panel-right::-webkit-scrollbar { width: 4px; }
  .panel-right::-webkit-scrollbar-track { background: transparent; }
  .panel-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Card ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
  }

  /* ── Calendar ── */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .cal-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .cal-nav {
    display: flex;
    gap: 6px;
  }

  .cal-nav button {
    width: 28px;
    height: 28px;
    border: none;
    background: var(--bg);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    transition: background 0.15s;
  }

  .cal-nav button:hover { background: var(--border); }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }

  .cal-weekday {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-sub);
    padding: 4px 0;
  }

  .cal-weekday:first-child { color: #FF3B30; }
  .cal-weekday:last-child { color: #007AFF; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3px 2px 5px;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.12s;
    min-height: 44px;
    user-select: none;
  }

  .cal-cell:hover { background: var(--bg); }
  .cal-cell.selected { background: #f0f0f5; }

  .cal-day-num {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .cal-cell.today .cal-day-num {
    background: #1a1a1a;
    color: #fff;
    font-weight: 700;
  }

  .cal-cell.selected:not(.today) .cal-day-num {
    background: var(--border);
    color: var(--text);
  }

  .cal-cell.other-month .cal-day-num { color: var(--text-muted); }
  .cal-cell.sun .cal-day-num { color: #FF3B30; }
  .cal-cell.sat .cal-day-num { color: #007AFF; }
  .cal-cell.today .cal-day-num { color: #fff !important; }

  .cal-dots {
    display: flex;
    gap: 2px;
    margin-top: 3px;
    min-height: 6px;
    align-items: center;
  }

  .cal-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #c7c7cc;
  }

  .cal-dot.done { background: #34C759; }

  /* ── Date Header ── */
  .date-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .date-header .day-num {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  .date-header .day-info {
    display: flex;
    flex-direction: column;
  }

  .date-header .day-week {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-sub);
  }

  .date-header .day-month {
    font-size: 12px;
    color: var(--text-muted);
  }

  .date-header .today-badge {
    margin-left: auto;
    background: #1a1a1a;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
  }

  /* ── Category Card ── */
  .cat-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .cat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.09); }

  .cat-card.cat-dragging {
    opacity: 0.4;
    box-shadow: none;
  }

  .cat-card.cat-drag-over {
    border-top: 3px solid #007AFF;
    margin-top: -3px;
  }

  .cat-header {
    display: flex;
    align-items: center;
    padding: 14px 16px 12px;
    gap: 8px;
    cursor: grab;
  }

  .cat-header:active { cursor: grabbing; }

  .cat-icon {
    font-size: 18px;
    line-height: 1;
  }

  .cat-color-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-name {
    flex: 1;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }

  .cat-count {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .cat-add-btn {
    width: 26px;
    height: 26px;
    border: none;
    background: var(--bg);
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-sub);
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .cat-add-btn:hover { background: var(--border); color: var(--text); }

  .cat-menu-btn {
    width: 26px;
    height: 26px;
    border: none;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.15s;
    flex-shrink: 0;
    opacity: 0;
  }

  .cat-header:hover .cat-menu-btn { opacity: 1; }
  .cat-menu-btn:hover { background: var(--bg); color: var(--text-sub); }

  .cat-body { padding: 0 12px 12px; }

  /* ── Subcategory ── */
  .subcat-header {
    display: flex;
    align-items: center;
    padding: 8px 8px 4px;
    gap: 6px;
    margin-top: 6px;
  }

  .subcat-header:first-child { margin-top: 0; }

  .subcat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .subcat-name {
    flex: 1;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: -0.1px;
  }

  .subcat-count {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .subcat-add-btn {
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .subcat-add-btn:hover { background: var(--bg); color: var(--text-sub); }

  .subcat-menu-btn {
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.15s;
    flex-shrink: 0;
    opacity: 0;
  }

  .subcat-header:hover .subcat-menu-btn { opacity: 1; }
  .subcat-header.archived { opacity: 0.5; }
  .subcat-menu-btn:hover { background: var(--bg); color: var(--text-sub); }

  .subcat-todos {
    padding-left: 6px;
  }

  .add-subcat-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    margin-top: 4px;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.12s;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
  }

  .add-subcat-bar:hover { background: var(--bg); color: var(--text-sub); }

  .subcat-inline-add {
    padding: 6px 8px;
    display: none;
    margin-top: 4px;
  }

  .subcat-inline-add.active { display: flex; gap: 6px; align-items: center; }

  .subcat-inline-add input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    background: var(--bg);
  }

  .subcat-inline-add input:focus { border-color: #1a1a1a; background: var(--card); }

  /* ── Todo Item ── */
  .todo-item {
    display: flex;
    align-items: center;
    padding: 9px 8px;
    gap: 10px;
    border-radius: var(--radius-sm);
    transition: background 0.12s;
    position: relative;
    cursor: default;
  }

  .todo-item:hover { background: var(--bg); }
  .todo-item:hover .todo-menu-btn { opacity: 1; }
  .todo-item[draggable="true"] { cursor: grab; }
  .todo-item.dragging { opacity: 0.4; }

  .cat-body.drag-over { background: rgba(0,0,0,0.03); border-radius: var(--radius-sm); }
  .subcat-todos.drag-over { background: rgba(0,0,0,0.03); border-radius: var(--radius-sm); }

  .todo-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }

  .todo-check.checked {
    border-color: transparent;
    color: #fff;
  }

  .todo-check.checked::after {
    content: '✓';
    font-size: 12px;
    font-weight: 700;
  }

  .todo-content {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .todo-text {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
    line-height: 1.3;
  }

  .todo-text.done {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .todo-item.expired {
    opacity: 0.45;
  }

  .todo-text.expired {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .todo-item.todo-drop-above {
    border-top: 2px solid #007AFF;
    margin-top: -2px;
  }

  .todo-item.todo-drop-below {
    border-bottom: 2px solid #007AFF;
    margin-bottom: -2px;
  }

  .todo-item.dragging {
    opacity: 0.3;
  }

  .todo-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .todo-duration {
    background: #f0f0f5;
    color: var(--text-sub);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
  }

  .todo-delayed {
    background: #FFF0F0;
    color: #FF3B30;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
  }

  .todo-time {
    font-size: 11px;
    color: var(--text-sub);
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .todo-menu-btn {
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-sub);
    font-size: 16px;
    opacity: 0;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .todo-menu-btn:hover { background: var(--border); }

  /* ── Inline Add Form ── */
  .inline-add {
    padding: 8px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    margin: 4px 0;
    display: none;
  }

  .inline-add.active { display: block; }

  .inline-add input[type="text"] {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    padding: 4px 0;
    font-weight: 500;
  }

  .inline-add input[type="text"]::placeholder { color: var(--text-muted); }

  .inline-add-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .duration-select, .time-input {
    border: none;
    background: var(--card);
    border-radius: 8px;
    padding: 5px 8px;
    font-size: 12px;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    outline: none;
  }

  .time-input { width: 90px; }

  .time-picker {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .time-part {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    cursor: pointer;
    flex: 1;
  }

  .time-part:focus { border-color: #1a1a1a; background: var(--card); }
  .time-part:disabled { opacity: 0.4; cursor: default; }

  .time-colon {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-sub);
  }

  .time-picker-inline {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .time-picker-inline select {
    border: none;
    background: var(--card);
    border-radius: 8px;
    padding: 5px 6px;
    font-size: 12px;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    outline: none;
  }

  .time-picker-inline .time-colon {
    font-size: 12px;
  }

  .inline-add-actions {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }

  .btn-save {
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }

  .btn-save:hover { opacity: 0.8; }

  .btn-cancel {
    background: var(--border);
    color: var(--text-sub);
    border: none;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }

  .btn-cancel:hover { opacity: 0.8; }

  /* ── Add Category Button ── */
  .add-cat-btn {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 14px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .add-cat-btn:hover { border-color: var(--text-sub); color: var(--text); background: var(--bg); }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 24px 16px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-state .emoji { font-size: 28px; display: block; margin-bottom: 8px; }

  /* ── Context Menu ── */
  .ctx-menu {
    position: fixed;
    background: var(--card);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    padding: 6px;
    z-index: 1000;
    min-width: 140px;
    display: none;
    animation: fadeIn 0.1s ease;
  }

  .ctx-menu.show { display: block; }

  .ctx-menu-item {
    padding: 9px 12px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s;
  }

  .ctx-menu-item:hover { background: var(--bg); }
  .ctx-menu-item.danger { color: #FF3B30; }
  .ctx-menu-item.danger:hover { background: #fff1f0; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 900;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
    animation: fadeIn 0.15s ease;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 20px;
    padding: 24px;
    width: 340px;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s ease;
  }

  .modal-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 18px;
    letter-spacing: -0.3px;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    margin-bottom: 6px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .form-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    background: var(--bg);
  }

  .form-input:focus { border-color: #1a1a1a; background: var(--card); }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }

  .emoji-option {
    width: 100%;
    aspect-ratio: 1;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .emoji-option:hover { border-color: var(--text-sub); background: var(--card); }
  .emoji-option.selected { border-color: #1a1a1a; background: var(--card); box-shadow: 0 0 0 2px rgba(0,0,0,0.08); }

  .color-grid {
    display: flex;
    gap: 8px;

<script>
// ─── Constants ────────────────────────────────────────────
const STORAGE_KEY = 'todoApp';
const DAYS = ['일','월','화','수','목','금','토'];
const EMOJIS = ['💰','✨','📈','🏋️','📚','🎯','💼','🌸','🎨','🎵','🍳','✈️','💻','📝','🏠','🌙'];
const COLORS = ['#FFB800','#7C7AEF','#FF6B8A','#34C759','#007AFF','#FF9500','#5AC8FA','#AF52DE','#FF3B30','#00C7BE','#1a1a1a','#8e8e93'];

const DEFAULT_DATA = {
  categories: [
    { id: 'cat-1', name: '취준', icon: '💰', color: '#FFB800', order: 0, parentId: null },
    { id: 'cat-1-1', name: '펜타시큐리티', icon: null, color: null, order: 0, parentId: 'cat-1' },
    { id: 'cat-1-2', name: '공통', icon: null, color: null, order: 1, parentId: 'cat-1' },
    { id: 'cat-2', name: 'To-do', icon: '✨', color: '#7C7AEF', order: 1, parentId: null },
    { id: 'cat-3', name: '데이터야놀자', icon: '📈', color: '#FF6B8A', order: 2, parentId: null }
  ],
  todos: [
    { id: 'todo-1', categoryId: 'cat-1-1', text: '면접 준비', date: '2026-04-07', done: false, duration: null, scheduledTime: null, order: 0, createdDate: '2026-04-07' },
    { id: 'todo-2', categoryId: 'cat-1-1', text: '보안 기본지식 정리', date: '2026-04-07', done: false, duration: null, scheduledTime: null, order: 1, createdDate: '2026-04-07' },
    { id: 'todo-3', categoryId: 'cat-1-2', text: '취준스터디 경신스', date: '2026-04-07', done: false, duration: null, scheduledTime: null, order: 0, createdDate: '2026-04-07' },
    { id: 'todo-4', categoryId: 'cat-2', text: '세빈카공', date: '2026-04-07', done: false, duration: null, scheduledTime: null, order: 0, createdDate: '2026-04-07' },
    { id: 'todo-5', categoryId: 'cat-2', text: 'e4i2 계획 정리', date: '2026-04-07', done: false, duration: null, scheduledTime: null, order: 1, createdDate: '2026-04-07' },
    { id: 'todo-6', categoryId: 'cat-3', text: '플파트 회의 준비', date: '2026-04-07', done: false, duration: '15m', scheduledTime: '18:00', order: 0, createdDate: '2026-04-07' },
    { id: 'todo-7', categoryId: 'cat-3', text: '플파트 회의', date: '2026-04-07', done: false, duration: '1h', scheduledTime: '21:30', order: 1, createdDate: '2026-04-07' },
    { id: 'todo-8', categoryId: 'cat-3', text: '전체 회의', date: '2026-04-07', done: false, duration: '1h', scheduledTime: null, order: 2, createdDate: '2026-04-07' }
  ]
};

// ─── State ────────────────────────────────────────────────
let data = { categories: [], todos: [] };
let calYear, calMonth;
let selectedDate;
let ctxTodoId = null;
let ctxSubcatId = null;
let editingCatId = null;
let useApi = false;

// ─── Storage ──────────────────────────────────────────────
async function loadData() {
  const apiUrl = 'http://localhost:8080';
  try {
    const res = await fetch(apiUrl + '/api/data');
    if (!res.ok) throw new Error('API error');
    const json = await res.json();
    useApi = true;
    if (!json) {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      await saveDataAsync();
    } else {
      data = json;
      let migrated = false;
      data.categories.forEach(c => {
        if (c.parentId === undefined) { c.parentId = null; migrated = true; }
      });
      // Migrate: add createdDate if missing
      data.todos.forEach(t => {
        if (!t.createdDate) { t.createdDate = t.date; migrated = true; }
      });
      data.categories.forEach(c => {
        if (c.archived === undefined) { c.archived = false; migrated = true; }
      });
      if (migrated) saveData();
    }
  } catch (e) {
    console.warn('API unavailable, using localStorage:', e.message);
    useApi = false;
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      saveData();
    } else {
      data = JSON.parse(raw);
      data.categories.forEach(c => {
        if (c.parentId === undefined) c.parentId = null;
      });
    }
  }
}

function saveData() {
  if (useApi) {
    fetch('http://localhost:8080/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(() => console.log('Saved to file')).catch(e => console.warn('Save failed:', e));
  }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

async function saveDataAsync() {
  if (useApi) {
    try {
      await fetch('http://localhost:8080/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      console.log('Saved to file (async)');
    } catch(e) { console.warn('Async save failed:', e); }
  }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function getSubcategories(parentId) {
  return data.categories.filter(c => c.parentId === parentId).sort((a, b) => a.order - b.order);
}

function getTopCategories() {
  return data.categories.filter(c => c.parentId === null).sort((a, b) => a.order - b.order);
}

function reorderCategory(draggedId, targetId) {
  const tops = getTopCategories();
  const draggedIdx = tops.findIndex(c => c.id === draggedId);
  const targetIdx = tops.findIndex(c => c.id === targetId);
  if (draggedIdx === -1 || targetIdx === -1) return;

  // Remove dragged from array, insert before target
  const ordered = tops.map(c => c.id);
  ordered.splice(draggedIdx, 1);
  const newTargetIdx = ordered.indexOf(targetId);
  ordered.splice(newTargetIdx, 0, draggedId);

  // Update order values
  ordered.forEach((id, i) => {
    const cat = data.categories.find(c => c.id === id);
    if (cat) cat.order = i;
  });

  saveData();
  renderTodos();
  renderCalendar();
}

function reorderTodo(draggedId, targetTodo, above) {
  const dragged = data.todos.find(t => t.id === draggedId);
  if (!dragged) return;

  // 같은 카테고리 내 이동 또는 다른 카테고리로 이동 모두 처리
  dragged.categoryId = targetTodo.categoryId;
  dragged.date = targetTodo.date;

  // 같은 카테고리+날짜의 할일들을 order 순으로 정렬
  const siblings = data.todos
    .filter(t => t.categoryId === targetTodo.categoryId && t.date === targetTodo.date && t.id !== draggedId)
    .sort((a, b) => a.order - b.order);

  const targetIdx = siblings.findIndex(t => t.id === targetTodo.id);
  const insertIdx = above ? targetIdx : targetIdx + 1;
  siblings.splice(insertIdx, 0, dragged);

  // order 값 재부여
  siblings.forEach((t, i) => t.order = i);

  saveData();
  renderTodos();
  renderCalendar();
}

function getAllTodoCatIds(catId) {
  // Returns catId + all subcategory ids
  const subs = getSubcategories(catId);
  if (subs.length === 0) return [catId];
  return [catId, ...subs.map(s => s.id)];
}

// ─── Utilities ────────────────────────────────────────────
function uid() {
  return 'id-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function toDateStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function todayStr() {
  const t = new Date();
  return toDateStr(t.getFullYear(), t.getMonth(), t.getDate());
}

function formatDisplayDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dow = new Date(y, m-1, d).getDay();
  return { y, m, d, dow, dayName: DAYS[dow] };
}

function formatTime(t) {
  if (!t) return '';
  const [h, min] = t.split(':').map(Number);
  const ampm = h < 12 ? '오전' : '오후';
  const hh = h % 12 === 0 ? 12 : h % 12;
  return `${ampm} ${hh}:${String(min).padStart(2,'0')}`;
}

// ─── Calendar ─────────────────────────────────────────────
function initCalendar() {
  const today = new Date();
  calYear = today.getFullYear();
  calMonth = today.getMonth();
  selectedDate = todayStr();
}

function renderCalendar() {
  const title = document.getElementById('cal-title');
  title.textContent = `${calYear}년 ${calMonth + 1}월`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  const today = todayStr();

  // Todo dot map for this calendar view
  const dotMap = {};
  data.todos.forEach(t => {
    if (!dotMap[t.date]) dotMap[t.date] = { total: 0, done: 0 };
    dotMap[t.date].total++;
    if (t.done) dotMap[t.date].done++;
  });

  // Total cells: enough rows
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    let day, month, year, isOther = false;
    if (i < firstDay) {
      day = daysInPrev - firstDay + i + 1;
      month = calMonth - 1;
      year = calYear;
      if (month < 0) { month = 11; year--; }
      isOther = true;
    } else if (i >= firstDay + daysInMonth) {
      day = i - firstDay - daysInMonth + 1;
      month = calMonth + 1;
      year = calYear;
      if (month > 11) { month = 0; year++; }
      isOther = true;
    } else {
      day = i - firstDay + 1;
      month = calMonth;
      year = calYear;
    }

    const dateStr = toDateStr(year, month, day);
    const dow = i % 7;
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    if (isOther) cell.classList.add('other-month');
    if (dow === 0) cell.classList.add('sun');
    if (dow === 6) cell.classList.add('sat');
    if (dateStr === today) cell.classList.add('today');
    if (dateStr === selectedDate) cell.classList.add('selected');

    cell.innerHTML = `<div class="cal-day-num">${day}</div><div class="cal-dots"></div>`;

    // Dots
    const dotsEl = cell.querySelector('.cal-dots');
    const info = dotMap[dateStr];
    if (info && info.total > 0) {
      const shown = Math.min(info.total, 3);
      for (let k = 0; k < shown; k++) {
        const dot = document.createElement('div');
        dot.className = 'cal-dot' + (k < info.done ? ' done' : '');
        dotsEl.appendChild(dot);
      }
    }

    cell.addEventListener('click', () => {
      selectedDate = dateStr;
      renderCalendar();
      renderTodos();
    });

    grid.appendChild(cell);
  }
}

// ─── Date Header ──────────────────────────────────────────
function renderDateHeader() {
  const el = document.getElementById('date-header');
  const { y, m, d, dayName } = formatDisplayDate(selectedDate);
  const isToday = selectedDate === todayStr();

  el.innerHTML = `
    <div class="day-num">${d}</div>
    <div class="day-info">
      <span class="day-week">${dayName}요일</span>
      <span class="day-month">${y}년 ${m}월</span>
    </div>
    ${isToday ? '<span class="today-badge">오늘</span>' : ''}
  `;
}

// ─── Stats ────────────────────────────────────────────────
function renderStats() {
  const todayTodos = data.todos.filter(t => t.date === selectedDate);
  const done = todayTodos.filter(t => t.done).length;
  const total = todayTodos.length;
  document.getElementById('stats-value').textContent = `${done} / ${total}`;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ─── Timeline ─────────────────────────────────────────────
function renderTimeline() {
  const container = document.getElementById('timeline-card');
  const todayTodos = data.todos.filter(t => t.date === selectedDate);

  if (todayTodos.length === 0) {
    container.innerHTML = `<div class="timeline-title">오늘 일정</div><div class="tl-empty">일정이 없습니다</div>`;
    return;
  }

  const withTime = todayTodos.filter(t => t.scheduledTime).sort((a, b) => a.scheduledTime.localeCompare(b.scheduledTime));
  const noTime = todayTodos.filter(t => !t.scheduledTime);

  let html = '<div class="timeline-title">오늘 일정</div><div class="timeline-list">';

  const allItems = [...withTime, ...noTime];

  allItems.forEach((todo, idx) => {
    const cat = data.categories.find(c => c.id === todo.categoryId);
    const parentCat = cat && cat.parentId ? data.categories.find(c => c.id === cat.parentId) : cat;
    const color = parentCat ? parentCat.color : '#ccc';
    const catName = parentCat ? parentCat.name : '';
    const isLast = idx === allItems.length - 1;
    const isNoTimeFirst = (idx === withTime.length && noTime.length > 0);

    if (isNoTimeFirst && withTime.length > 0) {
      html += '<div class="tl-section-label" style="padding-left:74px;">시간 미정</div>';
    }

    const timeStr = todo.scheduledTime ? formatTime(todo.scheduledTime) : '—';
    const doneClass = todo.done ? ' tl-done' : '';
    const checkedClass = todo.done ? ' tl-checked' : '';
    const checkBg = todo.done ? `background:${color};` : '';
    const durationStr = todo.duration ? ` · ${todo.duration}` : '';

    html += `
      <div class="tl-item">
        <div class="tl-time-col">${timeStr}</div>
        <div class="tl-line-col">
          <button class="tl-check${checkedClass}" data-todo-id="${todo.id}" style="${checkBg} --tl-color:${color}"></button>
          ${!isLast ? '<div class="tl-connector"></div>' : ''}
        </div>
        <div class="tl-content">
          <div class="tl-text${doneClass}">${escHtml(todo.text)}</div>
          <div class="tl-meta">${catName}${durationStr}</div>
        </div>
      </div>`;
  });

  html += '</div>';
  container.innerHTML = html;

  // 타임라인 체크 이벤트
  container.querySelectorAll('.tl-check').forEach(btn => {
    btn.addEventListener('click', () => {
      const todo = data.todos.find(t => t.id === btn.dataset.todoId);
      if (!todo) return;
      todo.done = !todo.done;
      saveData();
      renderTodos();
      renderCalendar();
    });
  });
}

// ─── Todos ────────────────────────────────────────────────
function getTodosForDate(dateStr) {
  return data.todos.filter(t => t.date === dateStr);
}

function renderTodos() {
  renderDateHeader();
  renderStats();
  renderTimeline();

  const area = document.getElementById('todo-area');
  area.innerHTML = '';

  const todosForDate = getTodosForDate(selectedDate);

  getTopCategories().forEach(cat => {
    const subcats = getSubcategories(cat.id);
    const hasSubcats = subcats.length > 0;

    // Collect all todos for this category (direct + subcategory)
    const allCatIds = getAllTodoCatIds(cat.id);
    const allCatTodos = todosForDate.filter(t => allCatIds.includes(t.categoryId));
    const allDone = allCatTodos.filter(t => t.done).length;

    const card = document.createElement('div');
    card.className = 'cat-card';
    card.dataset.catId = cat.id;
    card.draggable = true;

    // Category drag & drop
    card.addEventListener('dragstart', (e) => {
      if (e.target.closest('.todo-item')) return; // 할일 드래그는 무시
      e.dataTransfer.setData('application/cat-id', cat.id);
      card.classList.add('cat-dragging');
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('cat-dragging');
      document.querySelectorAll('.cat-drag-over').forEach(el => el.classList.remove('cat-drag-over'));
    });
    card.addEventListener('dragover', (e) => {
      if (!e.dataTransfer.types.includes('application/cat-id')) return;
      e.preventDefault();
      card.classList.add('cat-drag-over');
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('cat-drag-over');
    });
    card.addEventListener('drop', (e) => {
      if (!e.dataTransfer.types.includes('application/cat-id')) return;
      e.preventDefault();
      card.classList.remove('cat-drag-over');
      const draggedCatId = e.dataTransfer.getData('application/cat-id');
      if (draggedCatId === cat.id) return;
      reorderCategory(draggedCatId, cat.id);
    });

    // Header
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <span class="cat-icon">${cat.icon}</span>
      <div class="cat-color-dot" style="background:${cat.color}"></div>
      <span class="cat-name">${escHtml(cat.name)}</span>
      <span class="cat-count">${allDone}/${allCatTodos.length}</span>
      <button class="cat-add-btn" data-cat="${cat.id}" data-has-subcats="${hasSubcats}" title="${hasSubcats ? '할일 추가 (서브카테고리 선택)' : '할일 추가'}">+</button>
      <button class="cat-menu-btn" data-cat="${cat.id}">···</button>
    `;
    card.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'cat-body';

    if (hasSubcats) {
      // Render subcategories
      subcats.forEach(sub => {
        const subTodos = todosForDate
          .filter(t => t.categoryId === sub.id)
          .sort((a, b) => a.order - b.order);

        // 숨긴 서브카테고리: 이 날짜에 할일 없으면 스킵
        if (sub.archived && subTodos.length === 0) return;

        const subDone = subTodos.filter(t => t.done).length;

        // Subcategory header
        const subHeader = document.createElement('div');
        subHeader.className = 'subcat-header' + (sub.archived ? ' archived' : '');
        subHeader.innerHTML = `
          <div class="subcat-dot" style="background:${cat.color}"></div>
          <span class="subcat-name">${escHtml(sub.name)}${sub.archived ? ' <span style="font-size:10px;color:var(--text-muted)">(숨김)</span>' : ''}</span>
          <span class="subcat-count">${subDone}/${subTodos.length}</span>
          <button class="subcat-add-btn" data-cat="${sub.id}" title="할일 추가">+</button>
          <button class="subcat-menu-btn" data-subcat="${sub.id}">···</button>
        `;
        body.appendChild(subHeader);

        // Subcategory todos
        const subTodoWrap = document.createElement('div');
        subTodoWrap.className = 'subcat-todos';
        subTodoWrap.dataset.dropCat = sub.id;
        subTodos.forEach(todo => {
          subTodoWrap.appendChild(makeTodoEl(todo, cat));
        });

        // Inline add form for subcategory
        const addForm = makeInlineAddForm(sub.id);
        subTodoWrap.appendChild(addForm);

        body.appendChild(subTodoWrap);
      });

      // Also render direct todos (todos directly under parent, not in subcategory)
      const directTodos = todosForDate
        .filter(t => t.categoryId === cat.id)
        .sort((a, b) => a.order - b.order);
      if (directTodos.length > 0) {
        const directHeader = document.createElement('div');
        directHeader.className = 'subcat-header';
        directHeader.innerHTML = `
          <div class="subcat-dot" style="background:${cat.color}; opacity:0.4"></div>
          <span class="subcat-name">기타</span>
          <span class="subcat-count">${directTodos.filter(t=>t.done).length}/${directTodos.length}</span>
          <button class="subcat-add-btn" data-cat="${cat.id}" title="할일 추가">+</button>
        `;
        body.appendChild(directHeader);
        const directWrap = document.createElement('div');
        directWrap.className = 'subcat-todos';
        directWrap.dataset.dropCat = cat.id;
        directTodos.forEach(todo => directWrap.appendChild(makeTodoEl(todo, cat)));
        const addForm = makeInlineAddForm(cat.id);
        directWrap.appendChild(addForm);
        body.appendChild(directWrap);
      }

    } else {
      // No subcategories — render todos directly (original behavior)
      body.dataset.dropCat = cat.id;
      const catTodos = todosForDate
        .filter(t => t.categoryId === cat.id)
        .sort((a, b) => a.order - b.order);

      if (catTodos.length === 0) {
        body.innerHTML = '<div class="empty-state"><span class="emoji">🌿</span>할일을 추가해보세요</div>';
      }

      catTodos.forEach(todo => {
        body.appendChild(makeTodoEl(todo, cat));
      });

      const addForm = makeInlineAddForm(cat.id);
      body.appendChild(addForm);
    }

    card.appendChild(body);
    area.appendChild(card);
  });

  // Wire add todo buttons (both cat-level and subcat-level)
  area.querySelectorAll('.cat-add-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const catId = btn.dataset.cat;
      const hasSubcats = btn.dataset.hasSubcats === 'true';
      if (hasSubcats) {
        // For categories with subcats, show first subcategory's add form
        const subs = getSubcategories(catId);
        if (subs.length > 0) showInlineAdd(subs[0].id);
      } else {
        showInlineAdd(catId);
      }
    });
  });

  area.querySelectorAll('.subcat-add-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      showInlineAdd(btn.dataset.cat);
    });
  });

  // Wire drag & drop on drop zones
  area.querySelectorAll('[data-drop-cat]').forEach(zone => {
    const targetCatId = zone.dataset.dropCat;
    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', () => {
      zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      if (e.dataTransfer.types.includes('application/cat-id')) return; // 카테고리 드래그 무시
      const todoId = e.dataTransfer.getData('text/plain');
      const todo = data.todos.find(t => t.id === todoId);
      if (todo && todo.categoryId !== targetCatId) {
        todo.categoryId = targetCatId;
        // Reset order to end
        const siblings = data.todos.filter(t => t.categoryId === targetCatId && t.date === selectedDate);
        todo.order = siblings.reduce((m, t) => Math.max(m, t.order), -1) + 1;
        saveData();
        renderTodos();
        renderCalendar();
      }
    });
  });

  // Wire category menu buttons
  area.querySelectorAll('.cat-menu-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      showCatCtxMenu(e, btn.dataset.cat);
    });
  });

  // Wire subcategory menu buttons
  area.querySelectorAll('.subcat-menu-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      showSubcatCtxMenu(e, btn.dataset.subcat);
    });
  });

  // Wire add subcategory bars
  area.querySelectorAll('.add-subcat-bar').forEach(bar => {
    bar.addEventListener('click', () => {
      const parentId = bar.dataset.parentId;
      const form = document.getElementById(`add-subcat-form-${parentId}`);
      if (form) {
        form.classList.add('active');
        form.querySelector('.subcat-name-input').value = '';
        form.querySelector('.subcat-name-input').focus();
      }
    });
  });

  // Wire subcategory creation forms
  area.querySelectorAll('.subcat-inline-add').forEach(form => {
    const parentId = form.id.replace('add-subcat-form-', '');
    const input = form.querySelector('.subcat-name-input');
    const saveBtn = form.querySelector('.btn-save');
    const cancelBtn = form.querySelector('.btn-cancel');

    saveBtn.addEventListener('click', () => {
      const name = input.value.trim();
      if (!name) return;
      addSubcategory(parentId, name);
      form.classList.remove('active');
    });

    cancelBtn.addEventListener('click', () => form.classList.remove('active'));

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveBtn.click();
      if (e.key === 'Escape') cancelBtn.click();
    });
  });
}

function makeTodoEl(todo, cat) {
  const item = document.createElement('div');
  item.className = 'todo-item';
  item.dataset.id = todo.id;
  item.draggable = true;

  item.addEventListener('dragstart', (e) => {
    e.dataTransfer.setData('text/plain', todo.id);
    e.dataTransfer.setData('application/todo-id', todo.id);
    item.classList.add('dragging');
  });
  item.addEventListener('dragend', () => {
    item.classList.remove('dragging');
    document.querySelectorAll('.drag-over,.todo-drop-above,.todo-drop-below').forEach(el => {
      el.classList.remove('drag-over', 'todo-drop-above', 'todo-drop-below');
    });
  });
  item.addEventListener('dragover', (e) => {
    if (!e.dataTransfer.types.includes('application/todo-id')) return;
    e.preventDefault();
    e.stopPropagation();
    const rect = item.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    item.classList.remove('todo-drop-above', 'todo-drop-below');
    if (e.clientY < midY) {
      item.classList.add('todo-drop-above');
    } else {
      item.classList.add('todo-drop-below');
    }
  });
  item.addEventListener('dragleave', () => {
    item.classList.remove('todo-drop-above', 'todo-drop-below');
  });
  item.addEventListener('drop', (e) => {
    if (!e.dataTransfer.types.includes('application/todo-id')) return;
    e.preventDefault();
    e.stopPropagation();
    item.classList.remove('todo-drop-above', 'todo-drop-below');
    const draggedId = e.dataTransfer.getData('application/todo-id');
    if (draggedId === todo.id) return;
    const rect = item.getBoundingClientRect();
    const above = e.clientY < rect.top + rect.height / 2;
    reorderTodo(draggedId, todo, above);
  });

  // 기한 지난 미완료 항목 판별
  const isExpired = !todo.done && todo.date < todayStr();

  const checkColor = todo.done ? cat.color : 'transparent';
  const borderColor = todo.done ? cat.color : 'var(--border)';

  let metaHtml = '';
  if (todo.duration) metaHtml += `<span class="todo-duration">${todo.duration}</span>`;
  if (todo.scheduledTime) metaHtml += `<span class="todo-time">🕐 ${formatTime(todo.scheduledTime)}</span>`;

  // 미룬 일수
  if (todo.createdDate && todo.date !== todo.createdDate && !todo.done && !isExpired) {
    const created = new Date(todo.createdDate);
    const current = new Date(todo.date);
    const days = Math.round((current - created) / (1000 * 60 * 60 * 24));
    if (days > 0) {
      metaHtml += `<span class="todo-delayed">D+${days}</span>`;
    }
  }

  // 기한 만료 표시
  if (isExpired) {
    item.classList.add('expired');
  }

  const textClass = todo.done ? 'done' : (isExpired ? 'expired' : '');

  item.innerHTML = `
    <div class="todo-check ${todo.done ? 'checked' : ''}" style="background:${checkColor}; border-color:${borderColor}; --cat-color:${cat.color}" data-id="${todo.id}"></div>
    <div class="todo-content">
      <span class="todo-text ${textClass}">${escHtml(todo.text)}</span>
      ${metaHtml ? `<div class="todo-meta">${metaHtml}</div>` : ''}
    </div>
    <button class="todo-menu-btn" data-id="${todo.id}">···</button>
  `;

  // Check toggle
  item.querySelector('.todo-check').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleTodo(todo.id, e.currentTarget);
  });

  // Menu
  item.querySelector('.todo-menu-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    showCtxMenu(e, todo.id);
  });

  return item;
}

function makeInlineAddForm(catId) {
  const form = document.createElement('div');
  form.className = 'inline-add';
  form.id = `add-form-${catId}`;
  form.innerHTML = `
    <input type="text" placeholder="할일을 입력하세요..." class="add-text-input">
    <div class="inline-add-row">
      <select class="duration-select">
        <option value="">시간 없음</option>
        <option value="15m">15분</option>
        <option value="30m">30분</option>
        <option value="1h">1시간</option>
        <option value="2h">2시간</option>
        <option value="3h">3시간</option>
      </select>
      <div class="time-picker-inline">
        <select class="inline-ampm"><option value="">없음</option><option value="오전">오전</option><option value="오후">오후</option></select>
        <select class="inline-hour" disabled></select>
        <span class="time-colon">:</span>
        <select class="inline-min" disabled></select>
      </div>
      <div class="inline-add-actions">
        <button class="btn-cancel">취소</button>
        <button class="btn-save">저장</button>
      </div>
    </div>
  `;

  form.querySelector('.btn-save').addEventListener('click', () => {
    const text = form.querySelector('.add-text-input').value.trim();
    if (!text) return;
    const duration = form.querySelector('.duration-select').value || null;
    const scheduledTime = getTimePickerValue(
      form.querySelector('.inline-ampm'),
      form.querySelector('.inline-hour'),
      form.querySelector('.inline-min')
    );
    addTodo(catId, text, duration, scheduledTime);
    hideInlineAdd(catId);
  });

  form.querySelector('.btn-cancel').addEventListener('click', () => hideInlineAdd(catId));

  form.querySelector('.add-text-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') form.querySelector('.btn-save').click();
    if (e.key === 'Escape') form.querySelector('.btn-cancel').click();
  });

  return form;
}

function showInlineAdd(catId) {
  // Hide all others
  document.querySelectorAll('.inline-add.active').forEach(f => f.classList.remove('active'));
  const form = document.getElementById(`add-form-${catId}`);
  if (form) {
    form.classList.add('active');
    form.querySelector('.add-text-input').focus();
    // Clear
    form.querySelector('.add-text-input').value = '';
    form.querySelector('.duration-select').value = '';
    setupTimePicker(
      form.querySelector('.inline-ampm'),
      form.querySelector('.inline-hour'),
      form.querySelector('.inline-min'),
      ''
    );
  }
}

function hideInlineAdd(catId) {
  const form = document.getElementById(`add-form-${catId}`);
  if (form) form.classList.remove('active');
}

// ─── CRUD ─────────────────────────────────────────────────
function toggleTodo(id, el) {
  const todo = data.todos.find(t => t.id === id);
  if (!todo) return;
  todo.done = !todo.done;
  saveData();
  el.classList.add('check-pop');
  el.addEventListener('animationend', () => el.classList.remove('check-pop'), { once: true });
  // Re-render
  renderTodos();
  renderCalendar();
}

function addTodo(catId, text, duration, scheduledTime) {
  const catTodos = data.todos.filter(t => t.categoryId === catId && t.date === selectedDate);
  const maxOrder = catTodos.reduce((m, t) => Math.max(m, t.order), -1);
  data.todos.push({
    id: uid(),
    categoryId: catId,
    text,
    date: selectedDate,
    done: false,
    duration: duration || null,
    scheduledTime: scheduledTime || null,
    order: maxOrder + 1,
    createdDate: selectedDate
  });
  saveData();
  renderTodos();
  renderCalendar();
}

function deleteTodo(id) {
  data.todos = data.todos.filter(t => t.id !== id);
  saveData();
  renderTodos();
  renderCalendar();
}

function editTodo(id, text, duration, scheduledTime) {
  const todo = data.todos.find(t => t.id === id);
  if (!todo) return;
  todo.text = text;
  todo.duration = duration || null;
  todo.scheduledTime = scheduledTime || null;
  saveData();
  renderTodos();
}

// ─── Subcategory CRUD ────────────────────────────────────
function addSubcategory(parentId, name) {
  const siblings = getSubcategories(parentId);
  const maxOrder = siblings.reduce((m, c) => Math.max(m, c.order), -1);
  data.categories.push({
    id: uid(),
    name,
    icon: null,
    color: null,
    order: maxOrder + 1,
    parentId
  });
  saveData();
  renderTodos();
}

function deleteSubcategory(id) {
  // Move todos to parent or delete them
  data.todos = data.todos.filter(t => t.categoryId !== id);
  data.categories = data.categories.filter(c => c.id !== id);
  saveData();
  renderTodos();
  renderCalendar();
}

function renameSubcategory(id, newName) {
  const cat = data.categories.find(c => c.id === id);
  if (cat) {
    cat.name = newName;
    saveData();
    renderTodos();
  }
}

// ─── Context Menu ─────────────────────────────────────────
function showCtxMenu(e, todoId) {
  ctxTodoId = todoId;
  const menu = document.getElementById('ctx-menu');
  menu.classList.add('show');

  const x = e.clientX;
  const y = e.clientY;
  const mw = 160, mh = 80;
  menu.style.left = Math.min(x, window.innerWidth - mw - 8) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - mh - 8) + 'px';
}

function hideCtxMenu() {
  document.getElementById('ctx-menu').classList.remove('show');
  ctxTodoId = null;
}

document.getElementById('ctx-edit').addEventListener('click', () => {
  if (!ctxTodoId) return;
  showEditModal(ctxTodoId);
  hideCtxMenu();
});

document.getElementById('ctx-tomorrow').addEventListener('click', () => {
  if (!ctxTodoId) return;
  const todo = data.todos.find(t => t.id === ctxTodoId);
  if (todo) {
    const d = new Date(todo.date);
    d.setDate(d.getDate() + 1);
    todo.date = toDateStr(d.getFullYear(), d.getMonth(), d.getDate());
    todo.done = false;
    saveData();
    renderTodos();
    renderCalendar();
  }
  hideCtxMenu();
});

document.getElementById('ctx-delete').addEventListener('click', () => {
  if (!ctxTodoId) return;
  deleteTodo(ctxTodoId);
  hideCtxMenu();
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('ctx-menu').contains(e.target)) {
    hideCtxMenu();
  }
  if (!document.getElementById('subcat-ctx-menu').contains(e.target)) {
    hideSubcatCtxMenu();
  }
  if (!document.getElementById('cat-ctx-menu').contains(e.target)) {
    hideCatCtxMenu();
  }
});

// ─── Category Context Menu ───────────────────────────────
let ctxCatId = null;

function showCatCtxMenu(e, catId) {
  ctxCatId = catId;
  const menu = document.getElementById('cat-ctx-menu');

  // 숨긴 서브카테고리 복원 목록 동적 생성
  const oldRestoreItems = menu.querySelectorAll('.ctx-restore-item, .ctx-restore-divider');
  oldRestoreItems.forEach(el => el.remove());

  const archivedSubs = data.categories.filter(c => c.parentId === catId && c.archived);
  if (archivedSubs.length > 0) {
    const divider = document.createElement('div');
    divider.className = 'ctx-restore-divider';
    divider.style.cssText = 'border-top:1px solid var(--border); margin:4px 6px; padding-top:4px;';
    const label = document.createElement('div');
    label.style.cssText = 'padding:4px 12px; font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase;';
    label.textContent = '숨긴 서브카테고리';
    divider.appendChild(label);
    menu.appendChild(divider);

    archivedSubs.forEach(sub => {
      const item = document.createElement('div');
      item.className = 'ctx-menu-item ctx-restore-item';
      item.textContent = '↩️ ' + sub.name;
      item.addEventListener('click', () => {
        sub.archived = false;
        saveData();
        renderTodos();
        hideCatCtxMenu();
      });
      menu.appendChild(item);
    });
  }

  menu.classList.add('show');
  const mh = menu.offsetHeight || 120;
  menu.style.left = Math.min(e.clientX, window.innerWidth - 180 - 8) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - mh - 8) + 'px';
}

function hideCatCtxMenu() {
  document.getElementById('cat-ctx-menu').classList.remove('show');
  ctxCatId = null;
}

document.getElementById('cat-ctx-edit').addEventListener('click', () => {
  if (!ctxCatId) return;
  const cat = data.categories.find(c => c.id === ctxCatId);
  if (!cat) return;
  // Open edit modal with current values
  selectedEmoji = cat.icon || EMOJIS[0];
  selectedColor = cat.color || COLORS[0];
  editingCatId = ctxCatId;
  document.getElementById('cat-name-input').value = cat.name;
  document.getElementById('cat-modal-title').textContent = '카테고리 수정';
  buildCatModal();
  document.getElementById('cat-modal').classList.add('show');
  setTimeout(() => document.getElementById('cat-name-input').focus(), 100);
  hideCatCtxMenu();
});

document.getElementById('cat-ctx-add-subcat').addEventListener('click', () => {
  if (!ctxCatId) return;
  const name = prompt('서브카테고리 이름:');
  if (name && name.trim()) {
    addSubcategory(ctxCatId, name.trim());
  }
  hideCatCtxMenu();
});

document.getElementById('cat-ctx-delete').addEventListener('click', () => {
  if (!ctxCatId) return;
  const cat = data.categories.find(c => c.id === ctxCatId);
  if (!cat) return;
  if (confirm(`"${cat.name}" 카테고리와 모든 할일을 삭제할까요?`)) {
    // Delete subcategories + their todos
    const subIds = getSubcategories(ctxCatId).map(s => s.id);
    const allIds = [ctxCatId, ...subIds];
    data.todos = data.todos.filter(t => !allIds.includes(t.categoryId));
    data.categories = data.categories.filter(c => !allIds.includes(c.id));
    saveData();
    renderTodos();
    renderCalendar();
  }
  hideCatCtxMenu();
});

// ─── Subcategory Context Menu ────────────────────────────
function showSubcatCtxMenu(e, subcatId) {
  ctxSubcatId = subcatId;
  const cat = data.categories.find(c => c.id === subcatId);
  const archiveBtn = document.getElementById('subcat-ctx-archive');
  archiveBtn.textContent = cat && cat.archived ? '👁 보이기' : '📦 숨기기';
  const menu = document.getElementById('subcat-ctx-menu');
  menu.classList.add('show');
  const x = e.clientX;
  const y = e.clientY;
  menu.style.left = Math.min(x, window.innerWidth - 160 - 8) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - 80 - 8) + 'px';
}

function hideSubcatCtxMenu() {
  document.getElementById('subcat-ctx-menu').classList.remove('show');
  ctxSubcatId = null;
}

document.getElementById('subcat-ctx-rename').addEventListener('click', () => {
  if (!ctxSubcatId) return;
  const cat = data.categories.find(c => c.id === ctxSubcatId);
  if (!cat) return;
  const newName = prompt('서브카테고리 이름:', cat.name);
  if (newName && newName.trim()) {
    renameSubcategory(ctxSubcatId, newName.trim());
  }
  hideSubcatCtxMenu();
});

document.getElementById('subcat-ctx-archive').addEventListener('click', () => {
  if (!ctxSubcatId) return;
  const cat = data.categories.find(c => c.id === ctxSubcatId);
  if (cat) {
    cat.archived = !cat.archived;
    saveData();
    renderTodos();
  }
  hideSubcatCtxMenu();
});

document.getElementById('subcat-ctx-delete').addEventListener('click', () => {
  if (!ctxSubcatId) return;
  const cat = data.categories.find(c => c.id === ctxSubcatId);
  if (cat && confirm(`"${cat.name}" 서브카테고리와 하위 할일을 모두 삭제할까요?`)) {
    deleteSubcategory(ctxSubcatId);
  }
  hideSubcatCtxMenu();
});

// ─── Edit Modal ───────────────────────────────────────────
let editingTodoId = null;

function showEditModal(id) {
  const todo = data.todos.find(t => t.id === id);
  if (!todo) return;
  editingTodoId = id;
  document.getElementById('edit-text-input').value = todo.text;
  document.getElementById('edit-duration-input').value = todo.duration || '';
  setupTimePicker(
    document.getElementById('edit-time-ampm'),
    document.getElementById('edit-time-hour'),
    document.getElementById('edit-time-min'),
    todo.scheduledTime || ''
  );
  document.getElementById('edit-modal').classList.add('show');
  setTimeout(() => document.getElementById('edit-text-input').focus(), 100);
}

document.getElementById('edit-save').addEventListener('click', () => {
  const text = document.getElementById('edit-text-input').value.trim();
  if (!text) return;
  const duration = document.getElementById('edit-duration-input').value;
  const time = getTimePickerValue(
    document.getElementById('edit-time-ampm'),
    document.getElementById('edit-time-hour'),
    document.getElementById('edit-time-min')
  );
  editTodo(editingTodoId, text, duration, time);
  document.getElementById('edit-modal').classList.remove('show');
  editingTodoId = null;
});

document.getElementById('edit-cancel').addEventListener('click', () => {
  document.getElementById('edit-modal').classList.remove('show');
  editingTodoId = null;
});

document.getElementById('edit-modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('edit-modal')) {
    document.getElementById('edit-modal').classList.remove('show');
  }
});

// ─── Add Category ─────────────────────────────────────────
let selectedEmoji = EMOJIS[0];
let selectedColor = COLORS[0];

function buildCatModal() {
  const emojiGrid = document.getElementById('emoji-grid');
  emojiGrid.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-option' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.addEventListener('click', () => {
      selectedEmoji = e;
      emojiGrid.querySelectorAll('.emoji-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
    emojiGrid.appendChild(btn);
  });

  const colorGrid = document.getElementById('color-grid');
  colorGrid.innerHTML = '';
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-option' + (c === selectedColor ? ' selected' : '');
    btn.style.background = c;
    btn.addEventListener('click', () => {
      selectedColor = c;
      colorGrid.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
    colorGrid.appendChild(btn);
  });
}

document.getElementById('add-cat-btn').addEventListener('click', () => {
  editingCatId = null;
  selectedEmoji = EMOJIS[0];
  selectedColor = COLORS[0];
  document.getElementById('cat-name-input').value = '';
  document.getElementById('cat-modal-title').textContent = '카테고리 추가';
  buildCatModal();
  document.getElementById('cat-modal').classList.add('show');
  setTimeout(() => document.getElementById('cat-name-input').focus(), 100);
});

document.getElementById('cat-save').addEventListener('click', () => {
  const name = document.getElementById('cat-name-input').value.trim();
  if (!name) return;

  if (editingCatId) {
    // Edit existing category
    const cat = data.categories.find(c => c.id === editingCatId);
    if (cat) {
      cat.name = name;
      cat.icon = selectedEmoji;
      cat.color = selectedColor;
    }
    editingCatId = null;
  } else {
    // Add new category
    const maxOrder = data.categories.reduce((m, c) => Math.max(m, c.order), -1);
    data.categories.push({
      id: uid(),
      name,
      icon: selectedEmoji,
      color: selectedColor,
      order: maxOrder + 1,
      parentId: null
    });
  }
  saveData();
  document.getElementById('cat-modal').classList.remove('show');
  renderTodos();
});

document.getElementById('cat-cancel').addEventListener('click', () => {
  document.getElementById('cat-modal').classList.remove('show');
});

document.getElementById('cat-modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('cat-modal')) {
    document.getElementById('cat-modal').classList.remove('show');
  }
});

// ─── Calendar Navigation ──────────────────────────────────
document.getElementById('cal-prev').addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
});

document.getElementById('cal-next').addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
});

// ─── Keyboard Shortcuts ───────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    hideCtxMenu();
    hideSubcatCtxMenu();
    hideCatCtxMenu();
    document.querySelectorAll('.inline-add.active').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.subcat-inline-add.active').forEach(f => f.classList.remove('active'));
    document.getElementById('cat-modal').classList.remove('show');
    document.getElementById('edit-modal').classList.remove('show');
  }
});

// ─── Time Picker (오전/오후 + 시 + 분) ──────────────────
function setupTimePicker(ampmEl, hourEl, minEl, value) {
  // Build hour options (1~12)
  hourEl.innerHTML = '';
  for (let h = 1; h <= 12; h++) {
    const opt = document.createElement('option');
    opt.value = h;
    opt.textContent = h;
    hourEl.appendChild(opt);
  }
  // Build min options (00, 15, 30, 45)
  minEl.innerHTML = '';
  [0, 15, 30, 45].forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = String(m).padStart(2, '0');
    minEl.appendChild(opt);
  });

  // Set values from HH:MM string
  if (value) {
    const [hh, mm] = value.split(':').map(Number);
    ampmEl.value = hh < 12 ? '오전' : '오후';
    hourEl.value = hh % 12 === 0 ? 12 : hh % 12;
    minEl.value = Math.floor(mm / 15) * 15; // snap to nearest 15
    hourEl.disabled = false;
    minEl.disabled = false;
  } else {
    ampmEl.value = '';
    hourEl.disabled = true;
    minEl.disabled = true;
  }

  // Toggle hour/min enabled on ampm change
  ampmEl.onchange = () => {
    const enabled = ampmEl.value !== '';
    hourEl.disabled = !enabled;
    minEl.disabled = !enabled;
    if (enabled && !hourEl.value) hourEl.value = 12;
    if (enabled && !minEl.value) minEl.value = 0;
  };
}

function getTimePickerValue(ampmEl, hourEl, minEl) {
  if (!ampmEl.value) return null;
  let h = parseInt(hourEl.value);
  const m = parseInt(minEl.value);
  if (ampmEl.value === '오전') {
    if (h === 12) h = 0;
  } else {
    if (h !== 12) h += 12;
  }
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

// ─── HTML Escape ──────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

(async () => {
  try {
    await loadData();
    console.log('loadData OK, useApi:', useApi, 'categories:', data.categories.length);
    initCalendar();
    renderCalendar();
    renderTodos();
    console.log('Init complete');
  } catch(e) {
    console.error('Init error:', e);
  }
})();
</script>
