// ─── Timetable ────────────────────────────────────────────
const TT_PX_PER_HOUR = 72;      // 1시간 = 72px (30분 = 36px, 15분 = 18px)
const TT_PX_PER_MIN = TT_PX_PER_HOUR / 60;
const TT_SNAP_MIN = 15;

function parseHHMMtoMin(hhmm) {
  if (!hhmm) return null;
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function minToHHMM(min) {
  min = Math.max(0, Math.min(24 * 60 - 1, min));
  const h = Math.floor(min / 60);
  const m = min % 60;
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

function snapMin(min) {
  return Math.round(min / TT_SNAP_MIN) * TT_SNAP_MIN;
}

// 겹침 그룹 계산: 동시에 존재하는 블록들을 같은 그룹으로 묶음
function computeOverlapGroups(items) {
  // items: [{ start, end, ...todo }]
  // 각 아이템에 col(열 번호)과 cols(총 열 수) 할당
  const sorted = [...items].sort((a, b) => a.start - b.start || a.end - b.end);
  const groups = [];
  let current = [];
  let currentEnd = 0;

  for (const it of sorted) {
    if (current.length === 0 || it.start < currentEnd) {
      current.push(it);
      currentEnd = Math.max(currentEnd, it.end);
    } else {
      groups.push(current);
      current = [it];
      currentEnd = it.end;
    }
  }
  if (current.length) groups.push(current);

  // 각 그룹 내부에서 열 배정 (greedy)
  for (const group of groups) {
    const columns = []; // 각 column의 마지막 end
    for (const it of group) {
      let placed = false;
      for (let i = 0; i < columns.length; i++) {
        if (columns[i] <= it.start) {
          it.col = i;
          columns[i] = it.end;
          placed = true;
          break;
        }
      }
      if (!placed) {
        it.col = columns.length;
        columns.push(it.end);
      }
    }
    const total = columns.length;
    group.forEach(it => { it.cols = total; });
  }
  return items;
}

function renderTimetable() {
  const container = document.getElementById('timetable-view');
  // 기존 스크롤 위치 저장
  const prevScroll = document.getElementById('tt-scroll');
  if (prevScroll) ttScrollTop = prevScroll.scrollTop;
  const todos = data.todos.filter(t => t.date === selectedDate);

  // 시간 있는 / 시간 미정 분리
  const timed = [];
  const untimed = [];
  for (const todo of todos) {
    if (todo.scheduledTime) {
      const start = parseHHMMtoMin(todo.scheduledTime);
      // 높이 계산: actualTime 우선, 없으면 estimatedTime, 없으면 30분
      const estMin = parseDuration(todo.estimatedTime) || 0;
      const actMin = parseDuration(todo.actualTime) || 0;
      const visualMin = Math.max(estMin, actMin) || 30;
      let end = start + visualMin;
      if (end > 24 * 60) end = 24 * 60; // 자정 컷
      timed.push({ todo, start, end, estMin, actMin, hasEst: !!todo.estimatedTime });
    } else {
      untimed.push(todo);
    }
  }
  computeOverlapGroups(timed);

  // 그리드 빌드: 30분 단위 슬롯 48개 (15분 단위는 블록이 반 칸으로 표현)
  const slotHeight = TT_PX_PER_HOUR / 2; // 30min
  let gridHtml = '<div class="tt-grid" id="tt-grid" style="height:' + (24 * TT_PX_PER_HOUR) + 'px">';
  for (let i = 0; i < 48; i++) {
    const minFromMidnight = i * 30;
    const isHourMark = (minFromMidnight % 60 === 0);
    const hour = Math.floor(minFromMidnight / 60);
    const top = i * slotHeight;
    const labelHtml = isHourMark ? `<div class="tt-hour-label">${hour}</div>` : '';
    gridHtml += `<div class="tt-slot${isHourMark ? ' hour' : ' half'}" style="top:${top}px;position:absolute;left:0;right:0;height:${slotHeight}px;">
      ${labelHtml}
    </div>`;
  }
  // 현재 시각 라인 (오늘인 경우만)
  if (selectedDate === todayStr()) {
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    gridHtml += `<div class="tt-now-line" style="top:${nowMin * TT_PX_PER_MIN}px"></div>`;
  }
  // 블록
  timed.forEach(item => {
    gridHtml += renderTimetableBlock(item);
  });
  gridHtml += '</div>';

  // 미배치 섹션 (estimatedTime 있는 할일 = 블록, 없는 할일 = 칩)
  let unplacedHtml = '';
  if (untimed.length > 0) {
    const withEst = untimed.filter(t => parseDuration(t.estimatedTime) > 0);
    const noEst = untimed.filter(t => !parseDuration(t.estimatedTime));

    // 합계 계산
    const totalUnplacedMin = withEst.reduce((s, t) => s + parseDuration(t.estimatedTime), 0);
    const totalScheduledMin = timed.reduce((s, it) => s + (it.end - it.start), 0);
    const availableMin = Math.max(0, 24 * 60 - totalScheduledMin);
    const isOverflow = totalUnplacedMin > availableMin;

    // 헤더
    let headerHtml = '<div class="tt-unplaced-header">';
    headerHtml += '<span class="tt-unplaced-title">미배치</span>';
    headerHtml += '<div class="tt-unplaced-summary">';
    if (totalUnplacedMin > 0) {
      headerHtml += `<span class="tt-unplaced-badge${isOverflow ? ' warning' : ''}">${formatDuration(totalUnplacedMin)}</span>`;
    }
    headerHtml += `<span class="tt-unplaced-badge">빈 시간 ${formatDuration(availableMin)}</span>`;
    headerHtml += '</div></div>';

    // 블록 (estimatedTime 있는 할일)
    let blocksHtml = '';
    if (withEst.length > 0) {
      blocksHtml = '<div class="tt-unplaced-blocks">';
      withEst.forEach(todo => {
        const cat = findCategoryForTodo(todo);
        const color = cat ? cat.color : '#8e8e93';
        const estMin = parseDuration(todo.estimatedTime);
        const height = Math.max(24, estMin * TT_PX_PER_MIN);
        blocksHtml += `<div class="tt-unplaced-block" data-id="${todo.id}" draggable="true"
          style="height:${height}px;--tt-color:${color};">
          <div class="tt-title">${escHtml(todo.text)}</div>
          <div class="tt-sub">${todo.estimatedTime}</div>
        </div>`;
      });
      blocksHtml += '</div>';
    }

    // 칩 (estimatedTime 없는 할일)
    let chipsHtml = '';
    if (noEst.length > 0) {
      chipsHtml = '<div class="tt-untimed-list">';
      noEst.forEach(todo => {
        const cat = findCategoryForTodo(todo);
        const color = cat ? cat.color : '#8e8e93';
        chipsHtml += `<div class="tt-untimed-chip" data-id="${todo.id}" draggable="true">
          <span class="tt-chip-dot" style="background:${color}"></span>
          ${escHtml(todo.text)}
        </div>`;
      });
      chipsHtml += '</div>';
    }

    unplacedHtml = `<div class="tt-unplaced">${headerHtml}${blocksHtml}${chipsHtml}</div>`;
  }

  container.innerHTML = `<div class="tt-scroll" id="tt-scroll">${gridHtml}</div>${unplacedHtml}`;

  const scrollEl = document.getElementById('tt-scroll');
  if (scrollEl) {
    if (!ttInitialScrollDone && selectedDate === todayStr()) {
      // 최초 진입: 현재 시각을 중앙에 오게
      const now = new Date();
      const nowMin = now.getHours() * 60 + now.getMinutes();
      scrollEl.scrollTop = Math.max(0, nowMin * TT_PX_PER_MIN - scrollEl.clientHeight / 2);
      ttInitialScrollDone = true;
    } else if (ttScrollTop !== null) {
      // 재렌더: 기존 스크롤 위치 복원
      scrollEl.scrollTop = ttScrollTop;
    }
  }

  wireTimetableInteractions();
}

function findCategoryForTodo(todo) {
  const cat = data.categories.find(c => c.id === todo.categoryId);
  if (!cat) return null;
  return cat.parentId ? data.categories.find(c => c.id === cat.parentId) : cat;
}

function renderTimetableBlock(item) {
  const { todo, start, end, estMin, actMin, hasEst } = item;
  const cat = findCategoryForTodo(todo);
  const color = cat ? cat.color : '#8e8e93';
  const top = start * TT_PX_PER_MIN;
  const height = Math.max(18, (end - start) * TT_PX_PER_MIN);
  const widthPct = 100 / item.cols;
  const leftPct = item.col * widthPct;

  // 실제시간 채움: actualMin만큼 위에서부터
  let fills = '';
  if (actMin > 0 && estMin > 0) {
    const actualFillH = Math.min(actMin, estMin) * TT_PX_PER_MIN;
    fills += `<div class="tt-actual-fill" style="height:${actualFillH}px"></div>`;
    if (actMin > estMin) {
      const overH = (actMin - estMin) * TT_PX_PER_MIN;
      const overTop = estMin * TT_PX_PER_MIN;
      fills += `<div class="tt-over-fill" style="top:${overTop}px;height:${overH}px"></div>`;
    }
  } else if (actMin > 0 && !estMin) {
    const h = actMin * TT_PX_PER_MIN;
    fills += `<div class="tt-actual-fill" style="height:${h}px"></div>`;
  }

  const doneClass = todo.done ? ' done' : '';
  const subInfo = todo.estimatedTime
    ? (todo.actualTime ? `${todo.estimatedTime} → ${todo.actualTime}` : todo.estimatedTime)
    : (todo.actualTime ? todo.actualTime : '미정 30m');

  // 블록은 52px offset(라벨 영역) 이후부터 배치
  const colFrac = item.col / item.cols;
  const leftCss = `calc(52px + (100% - 52px) * ${colFrac} + 4px)`;
  const widthCss = `calc((100% - 52px) / ${item.cols} - 12px)`;

  return `<div class="tt-block${doneClass}" data-id="${todo.id}"
    style="top:${top}px;height:${height}px;left:${leftCss};width:${widthCss};--tt-color:${color};">
    <div class="tt-resize top"></div>
    ${fills}
    <div class="tt-title">${escHtml(todo.text)}</div>
    <div class="tt-sub">${formatTime(todo.scheduledTime)} · ${subInfo}</div>
    <div class="tt-resize bottom"></div>
  </div>`;
}

function wireTimetableInteractions() {
  // 블록 클릭 → 수정 모달
  document.querySelectorAll('.tt-block').forEach(block => {
    block.addEventListener('click', (e) => {
      if (e.target.classList.contains('tt-resize')) return;
      if (block.dataset.dragged === '1') { block.dataset.dragged = ''; return; }
      showEditModal(block.dataset.id);
    });
    attachBlockDrag(block);
    attachBlockResize(block);
  });
  // 미배치 블록 + 칩 → 클릭(수정 모달) + 드래그(타임축에 놓기)
  document.querySelectorAll('.tt-unplaced-block, .tt-untimed-chip').forEach(el => {
    attachUntimedChipDrag(el);
    el.addEventListener('click', () => showEditModal(el.dataset.id));
  });
}

// 블록 이동 (native mouse events; 15분 스냅)
function attachBlockDrag(block) {
  const header = block; // 전체 블록이 드래그 핸들, 단 resize는 제외
  header.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('tt-resize')) return;
    e.preventDefault();
    const todo = data.todos.find(t => t.id === block.dataset.id);
    if (!todo) return;
    const startY = e.clientY;
    const origMin = parseHHMMtoMin(todo.scheduledTime);
    let moved = false;
    const onMove = (ev) => {
      const dy = ev.clientY - startY;
      if (Math.abs(dy) > 3) moved = true;
      const deltaMin = snapMin(dy / TT_PX_PER_MIN);
      let newMin = origMin + deltaMin;
      newMin = Math.max(0, Math.min(24 * 60 - 15, newMin));
      block.style.top = (newMin * TT_PX_PER_MIN) + 'px';
      block.dataset.newMin = newMin;
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if (moved && block.dataset.newMin !== undefined) {
        todo.scheduledTime = minToHHMM(parseInt(block.dataset.newMin));
        saveData();
        renderTodos();
        block.dataset.dragged = '1';
      }
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// 블록 리사이즈 (위/아래 엣지)
function attachBlockResize(block) {
  block.querySelectorAll('.tt-resize').forEach(handle => {
    handle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const todo = data.todos.find(t => t.id === block.dataset.id);
      if (!todo) return;
      const isTop = handle.classList.contains('top');
      const startY = e.clientY;
      const origTop = parseFloat(block.style.top);
      const origHeight = parseFloat(block.style.height);
      const startMin = parseHHMMtoMin(todo.scheduledTime);
      const origMin = parseDuration(todo.estimatedTime || todo.actualTime) || 30;

      const onMove = (ev) => {
        const dy = ev.clientY - startY;
        const deltaMin = snapMin(dy / TT_PX_PER_MIN);
        if (isTop) {
          let newStartMin = Math.max(0, snapMin(startMin + deltaMin));
          let newDurMin = origMin - (newStartMin - startMin);
          if (newDurMin < 15) newDurMin = 15;
          block.style.top = (newStartMin * TT_PX_PER_MIN) + 'px';
          block.style.height = (newDurMin * TT_PX_PER_MIN) + 'px';
          block.dataset.newStart = newStartMin;
          block.dataset.newDur = newDurMin;
        } else {
          let newDurMin = Math.max(15, origMin + deltaMin);
          if (startMin + newDurMin > 24 * 60) newDurMin = 24 * 60 - startMin;
          block.style.height = (newDurMin * TT_PX_PER_MIN) + 'px';
          block.dataset.newDur = newDurMin;
        }
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        const newDurMin = parseInt(block.dataset.newDur);
        const newStartMin = block.dataset.newStart !== undefined ? parseInt(block.dataset.newStart) : startMin;
        if (!isNaN(newDurMin)) {
          const newDurStr = formatDuration(newDurMin);
          // 규칙: estimatedTime 없으면 생성, 있으면 actualTime 기록
          if (!todo.estimatedTime) {
            todo.estimatedTime = newDurStr;
          } else {
            todo.actualTime = newDurStr;
          }
          if (isTop) todo.scheduledTime = minToHHMM(newStartMin);
          saveData();
          renderTodos();
        }
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// 시간 미정 칩 → 타임축에 드래그 앤 드롭
function attachUntimedChipDrag(chip) {
  chip.addEventListener('dragstart', (e) => {
    e.dataTransfer.setData('application/untimed-id', chip.dataset.id);
    chip.classList.add('dragging');
  });
  chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
}

// 그리드에 드롭 받기
function wireTimetableGridDrop() {
  document.addEventListener('dragover', (e) => {
    if (e.dataTransfer.types.includes('application/untimed-id')) {
      const grid = document.getElementById('tt-grid');
      if (grid && grid.contains(e.target)) e.preventDefault();
    }
  });
  document.addEventListener('drop', (e) => {
    if (!e.dataTransfer.types.includes('application/untimed-id')) return;
    const grid = document.getElementById('tt-grid');
    if (!grid || !grid.contains(e.target)) return;
    e.preventDefault();
    const id = e.dataTransfer.getData('application/untimed-id');
    const todo = data.todos.find(t => t.id === id);
    if (!todo) return;
    const rect = grid.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const min = snapMin(y / TT_PX_PER_MIN);
    todo.scheduledTime = minToHHMM(Math.max(0, Math.min(24 * 60 - 15, min)));
    saveData();
    renderTodos();
  });
}

// ─── Timeline ─────────────────────────────────────────────
function renderTimeline() {
  const container = document.getElementById('timeline-card');
  const todayTodos = data.todos.filter(t => t.date === selectedDate);

  if (todayTodos.length === 0) {
    container.innerHTML = `<div class="timeline-title">오늘 일정</div><div class="tl-empty">일정이 없습니다</div>`;
    return;
  }

  const withTime = todayTodos.filter(t => t.scheduledTime).sort((a, b) => a.scheduledTime.localeCompare(b.scheduledTime));
  const noTime = todayTodos.filter(t => !t.scheduledTime);

  let html = '<div class="timeline-title">오늘 일정</div><div class="timeline-list">';

  const allItems = [...withTime, ...noTime];

  allItems.forEach((todo, idx) => {
    const cat = data.categories.find(c => c.id === todo.categoryId);
    const parentCat = cat && cat.parentId ? data.categories.find(c => c.id === cat.parentId) : cat;
    const color = parentCat ? parentCat.color : '#ccc';
    const catName = parentCat ? parentCat.name : '';
    const isLast = idx === allItems.length - 1;
    const isNoTimeFirst = (idx === withTime.length && noTime.length > 0);

    if (isNoTimeFirst && withTime.length > 0) {
      html += '<div class="tl-section-label" style="padding-left:74px;">시간 미정</div>';
    }

    const timeStr = todo.scheduledTime ? formatTime(todo.scheduledTime) : '—';
    const doneClass = todo.done ? ' tl-done' : '';
    const checkedClass = todo.done ? ' tl-checked' : '';
    const checkBg = todo.done ? `background:${color};` : '';
    const durationStr = todo.estimatedTime || todo.actualTime
      ? ` · ${todo.actualTime || todo.estimatedTime}${todo.actualTime && todo.estimatedTime ? ' (예상 '+todo.estimatedTime+')' : ''}`
      : '';

    html += `
      <div class="tl-item">
        <div class="tl-time-col">${timeStr}</div>
        <div class="tl-line-col">
          <button class="tl-check${checkedClass}" data-todo-id="${todo.id}" style="${checkBg} --tl-color:${color}"></button>
          ${!isLast ? '<div class="tl-connector"></div>' : ''}
        </div>
        <div class="tl-content">
          <div class="tl-text${doneClass}">${escHtml(todo.text)}</div>
          <div class="tl-meta">${catName}${durationStr}</div>
        </div>
      </div>`;
  });

  html += '</div>';
  container.innerHTML = html;

  // 타임라인 체크 이벤트
  container.querySelectorAll('.tl-check').forEach(btn => {
    btn.addEventListener('click', () => {
      const todo = data.todos.find(t => t.id === btn.dataset.todoId);
      if (!todo) return;
      todo.done = !todo.done;
      saveData();
      renderTodos();
      renderCalendar();
    });
  });
}

// ─── Weekly Retrospective ────────────────────────────────
function getWeekRange(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay(); // 0=Sun
  const diffToMon = day === 0 ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(d.getDate() + diffToMon);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const dd = new Date(mon);
    dd.setDate(mon.getDate() + i);
    days.push(toDateStr(dd.getFullYear(), dd.getMonth(), dd.getDate()));
  }
  return {
    weekStart: days[0],
    weekEnd: days[6],
    days,
    weekLabel: `${mon.getMonth()+1}/${mon.getDate()} ~ ${new Date(mon.getTime() + 6*86400000).getMonth()+1}/${new Date(mon.getTime() + 6*86400000).getDate()}`
  };
}

function getWeekTodos(weekRange) {
  return data.todos.filter(t => t.date >= weekRange.weekStart && t.date <= weekRange.weekEnd);
}

function getCategoryInfo(categoryId) {
  const cat = data.categories.find(c => c.id === categoryId);
  if (!cat) return { name: '기타', icon: '', color: '#999', parentId: null };
  if (cat.parentId) {
    const parent = data.categories.find(c => c.id === cat.parentId);
    return { name: cat.name, icon: parent?.icon || '', color: parent?.color || '#999', parentId: cat.parentId, parentName: parent?.name || '' };
  }
  return { name: cat.name, icon: cat.icon || '', color: cat.color || '#999', parentId: null };
}

function getParentCategoryForTodo(todo) {
  const cat = data.categories.find(c => c.id === todo.categoryId);
  if (!cat) return null;
  if (cat.parentId) return data.categories.find(c => c.id === cat.parentId);
  return cat;
}

function renderRetroView() {
  const container = document.getElementById('retro-view');
  const week = getWeekRange(selectedDate);
  const weekTodos = getWeekTodos(week);

  if (weekTodos.length === 0) {
    container.innerHTML = `
      <div class="retro-content">
        <div class="retro-header">
          <button class="retro-nav-btn" onclick="retroNavWeek(-1)">◀</button>
          <span class="retro-week-label">${week.weekLabel}</span>
          <button class="retro-nav-btn" onclick="retroNavWeek(1)">▶</button>
        </div>
        <div class="retro-empty">
          <div class="retro-empty-icon">📭</div>
          <div>이 주에는 기록이 없습니다</div>
        </div>
      </div>`;
    return;
  }

  const done = weekTodos.filter(t => t.done).length;
  const total = weekTodos.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  // Time aggregation
  let totalEst = 0, totalAct = 0, estCount = 0;
  weekTodos.forEach(t => {
    if (t.estimatedTime) { totalEst += parseDuration(t.estimatedTime); estCount++; }
    if (t.actualTime) totalAct += parseDuration(t.actualTime);
  });

  // Category summary
  const catMap = new Map();
  weekTodos.forEach(t => {
    const parent = getParentCategoryForTodo(t);
    if (!parent) return;
    if (!catMap.has(parent.id)) {
      catMap.set(parent.id, { cat: parent, todos: [], done: 0, total: 0, est: 0, act: 0, maxOverrun: null, maxOverrunMin: 0 });
    }
    const entry = catMap.get(parent.id);
    entry.todos.push(t);
    entry.total++;
    if (t.done) entry.done++;
    if (t.estimatedTime) entry.est += parseDuration(t.estimatedTime);
    if (t.actualTime) entry.act += parseDuration(t.actualTime);
    // Track biggest overrun
    if (t.estimatedTime && t.actualTime) {
      const diff = parseDuration(t.actualTime) - parseDuration(t.estimatedTime);
      if (diff > entry.maxOverrunMin) {
        entry.maxOverrunMin = diff;
        entry.maxOverrun = t;
      }
    }
  });

  // Sort categories by total todos descending
  const catEntries = [...catMap.values()].sort((a, b) => b.total - a.total);

  // Build category summary HTML
  let catHtml = '';
  catEntries.forEach(({ cat, done: d, total: t, est, act, maxOverrun, maxOverrunMin }) => {
    const catPct = t > 0 ? Math.round((d / t) * 100) : 0;
    const timeDelta = act - est;
    const deltaClass = timeDelta > 0 ? 'retro-time-over' : timeDelta < 0 ? 'retro-time-under' : '';
    const timeHtml = (est > 0 || act > 0) ? `
      <div class="retro-cat-time">
        ${est > 0 ? `예상 ${formatDuration(est)}` : ''}${est > 0 && act > 0 ? ' → ' : ''}${act > 0 ? `실제 ${formatDuration(act)}` : ''}
        ${(est > 0 && act > 0) ? `<span class="${deltaClass}">(${formatDurationSigned(timeDelta)})</span>` : ''}
      </div>` : '';
    const overrunHtml = (maxOverrun && maxOverrunMin > 15) ? `
      <div class="retro-cat-overrun">⚠️ ${escHtml(maxOverrun.text)} (${maxOverrun.estimatedTime} → ${maxOverrun.actualTime})</div>` : '';

    catHtml += `
      <div class="retro-cat-card" style="border-left-color: ${cat.color || '#999'}">
        <div class="retro-cat-header">
          <span class="retro-cat-name">${cat.icon || ''} ${escHtml(cat.name)}</span>
          <span class="retro-cat-count">${d}/${t} (${catPct}%)</span>
        </div>
        ${timeHtml}
        ${overrunHtml}
      </div>`;
  });

  // Build daily breakdown HTML
  const DAYS_SHORT = ['일', '월', '화', '수', '목', '금', '토'];
  let dailyHtml = '';
  week.days.forEach(dateStr => {
    const dayTodos = weekTodos.filter(t => t.date === dateStr);
    if (dayTodos.length === 0) return;
    const { m, d, dow } = formatDisplayDate(dateStr);
    const dayDone = dayTodos.filter(t => t.done).length;
    const dayTotal = dayTodos.length;

    // Group by parent category
    const dayCatMap = new Map();
    dayTodos.forEach(t => {
      const parent = getParentCategoryForTodo(t);
      const key = parent ? parent.id : '_none';
      if (!dayCatMap.has(key)) dayCatMap.set(key, { cat: parent, todos: [] });
      dayCatMap.get(key).todos.push(t);
    });

    let todosHtml = '';
    dayCatMap.forEach(({ cat, todos }) => {
      todos.sort((a, b) => (a.scheduledTime || '99:99').localeCompare(b.scheduledTime || '99:99'));
      todos.forEach(t => {
        const icon = cat?.icon || '';
        const doneClass = t.done ? 'retro-todo-done' : 'retro-todo-undone';
        const check = t.done ? '✅' : '⬜';
        const timeStr = t.scheduledTime ? `<span class="retro-todo-time">${formatTime(t.scheduledTime)}</span>` : '';
        const durBadge = renderRetroDurationBadge(t);
        todosHtml += `
          <div class="retro-todo-item ${doneClass}">
            <span class="retro-todo-check">${check}</span>
            <span class="retro-todo-icon">${icon}</span>
            ${timeStr}
            <span class="retro-todo-text">${escHtml(t.text)}</span>
            ${durBadge}
          </div>`;
      });
    });

    dailyHtml += `
      <div class="retro-day">
        <div class="retro-day-header" onclick="this.parentElement.classList.toggle('collapsed')">
          <span class="retro-day-label">${m}/${d} (${DAYS_SHORT[dow]})</span>
          <span class="retro-day-count ${dayDone === dayTotal ? 'all-done' : ''}">${dayDone === dayTotal ? '✨ ' : ''}${dayDone}/${dayTotal}</span>
          <span class="retro-day-chevron">▾</span>
        </div>
        <div class="retro-day-body">${todosHtml}</div>
      </div>`;
  });

  // Insights
  let insightHtml = '';
  // Busiest day
  const dayCountMap = {};
  week.days.forEach(d => { dayCountMap[d] = weekTodos.filter(t => t.date === d).length; });
  const busiestDay = Object.entries(dayCountMap).sort((a, b) => b[1] - a[1])[0];
  if (busiestDay && busiestDay[1] > 0) {
    const bd = formatDisplayDate(busiestDay[0]);
    insightHtml += `<div class="retro-insight-item">📅 가장 바빴던 날: <strong>${bd.m}/${bd.d} (${DAYS_SHORT[bd.dow]})</strong> — ${busiestDay[1]}개</div>`;
  }
  // Most active category
  if (catEntries.length > 0) {
    const top = catEntries[0];
    insightHtml += `<div class="retro-insight-item">${top.cat.icon || '📁'} 가장 활발한 카테고리: <strong>${escHtml(top.cat.name)}</strong> — ${top.total}개</div>`;
  }
  // Time accuracy
  if (estCount > 0 && totalAct > 0) {
    const accuracy = Math.round((1 - Math.abs(totalAct - totalEst) / totalEst) * 100);
    insightHtml += `<div class="retro-insight-item">⏱ 시간 예측 정확도: <strong>${Math.max(0, accuracy)}%</strong></div>`;
  }
  // Undone items
  const undone = weekTodos.filter(t => !t.done);
  if (undone.length > 0) {
    insightHtml += `<div class="retro-insight-item">📌 미완료: <strong>${undone.length}개</strong></div>`;
  }

  // Time summary
  const timeDelta = totalAct - totalEst;
  const timeDeltaClass = timeDelta > 0 ? 'retro-time-over' : timeDelta < 0 ? 'retro-time-under' : '';
  const timeSummaryHtml = (totalEst > 0 || totalAct > 0) ? `
    <div class="retro-time-summary">
      ${totalEst > 0 ? `예상 ${formatDuration(totalEst)}` : ''}${totalEst > 0 && totalAct > 0 ? ' → ' : ''}${totalAct > 0 ? `실제 ${formatDuration(totalAct)}` : ''}
      ${(totalEst > 0 && totalAct > 0) ? `<span class="${timeDeltaClass}">(${formatDurationSigned(timeDelta)})</span>` : ''}
    </div>` : '';

  container.innerHTML = `
    <div class="retro-content">
      <div class="retro-header">
        <button class="retro-nav-btn" onclick="retroNavWeek(-1)">◀</button>
        <span class="retro-week-label">${week.weekLabel}</span>
        <button class="retro-nav-btn" onclick="retroNavWeek(1)">▶</button>
      </div>
      <div class="retro-summary">
        <div class="retro-summary-title">주간 요약</div>
        <div class="retro-completion">
          <span>완료 ${done}/${total}</span>
          <span class="retro-pct">${pct}%</span>
        </div>
        <div class="progress-bar-wrap" style="margin: 8px 0;">
          <div class="progress-bar-fill" style="width:${pct}%; background: ${pct === 100 ? '#34C759' : '#FFB800'};"></div>
        </div>
        ${timeSummaryHtml}
      </div>
      ${catEntries.length > 0 ? `
        <div class="retro-section-title">카테고리별 요약</div>
        <div class="retro-cat-list">${catHtml}</div>
      ` : ''}
      <div class="retro-section-title">일별 기록</div>
      <div class="retro-daily-list">${dailyHtml}</div>
      ${insightHtml ? `
        <div class="retro-section-title">인사이트</div>
        <div class="retro-insights">${insightHtml}</div>
      ` : ''}
    </div>`;
}

function renderRetroDurationBadge(todo) {
  const est = todo.estimatedTime;
  const act = todo.actualTime;
  if (!est && !act) return '';
  const estMin = parseDuration(est);
  const actMin = parseDuration(act);
  if (est && act) {
    const diff = actMin - estMin;
    const cls = diff > 0 ? 'retro-time-over' : diff < 0 ? 'retro-time-under' : '';
    return `<span class="retro-dur-badge">${est} → ${act} <span class="${cls}">(${formatDurationSigned(diff)})</span></span>`;
  }
  return `<span class="retro-dur-badge">⏱ ${est || act}</span>`;
}

function retroNavWeek(delta) {
  const d = new Date(selectedDate + 'T00:00:00');
  d.setDate(d.getDate() + delta * 7);
  selectedDate = toDateStr(d.getFullYear(), d.getMonth(), d.getDate());
  renderCalendar();
  renderTodos();
}

// ─── Todos ────────────────────────────────────────────────
function getTodosForDate(dateStr) {
  return data.todos.filter(t => t.date === dateStr);
}

function renderTodos() {
  renderDateHeader();
  renderStats();
  renderTimeline();
  applyViewMode();

  if (currentView === 'timetable') {
    renderTimetable();
  }

  if (currentView === 'retro') {
    renderRetroView();
  }

  const area = document.getElementById('todo-area');
  area.innerHTML = '';

  const todosForDate = getTodosForDate(selectedDate);

  getTopCategories().forEach(cat => {
    const subcats = getSubcategories(cat.id);
    const hasSubcats = subcats.length > 0;

    // Collect all todos for this category (direct + subcategory)
    const allCatIds = getAllTodoCatIds(cat.id);
    const allCatTodos = todosForDate.filter(t => allCatIds.includes(t.categoryId));
    const allDone = allCatTodos.filter(t => t.done).length;

    const card = document.createElement('div');
    card.className = 'cat-card';
    card.dataset.catId = cat.id;
    card.draggable = true;

    // Category drag & drop
    card.addEventListener('dragstart', (e) => {
      if (e.target.closest('.todo-item')) return; // 할일 드래그는 무시
      e.dataTransfer.setData('application/cat-id', cat.id);
      card.classList.add('cat-dragging');
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('cat-dragging');
      document.querySelectorAll('.cat-drag-over').forEach(el => el.classList.remove('cat-drag-over'));
    });
    card.addEventListener('dragover', (e) => {
      if (!e.dataTransfer.types.includes('application/cat-id')) return;
      e.preventDefault();
      card.classList.add('cat-drag-over');
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('cat-drag-over');
    });
    card.addEventListener('drop', (e) => {
      if (!e.dataTransfer.types.includes('application/cat-id')) return;
      e.preventDefault();
      card.classList.remove('cat-drag-over');
      const draggedCatId = e.dataTransfer.getData('application/cat-id');
      if (draggedCatId === cat.id) return;
      reorderCategory(draggedCatId, cat.id);
    });

    // Header
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <span class="cat-icon">${cat.icon}</span>
      <div class="cat-color-dot" style="background:${cat.color}"></div>
      <span class="cat-name">${escHtml(cat.name)}</span>
      <span class="cat-count">${allDone}/${allCatTodos.length}</span>
      <button class="cat-add-btn" data-cat="${cat.id}" data-has-subcats="${hasSubcats}" title="${hasSubcats ? '할일 추가 (서브카테고리 선택)' : '할일 추가'}">+</button>
      <button class="cat-menu-btn" data-cat="${cat.id}">···</button>
    `;
    card.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'cat-body';

    if (hasSubcats) {
      // Render subcategories
      subcats.forEach(sub => {
        const subTodos = todosForDate
          .filter(t => t.categoryId === sub.id)
          .sort((a, b) => a.order - b.order);

        // 숨긴 서브카테고리: 이 날짜에 할일 없으면 스킵
        if (sub.archived && subTodos.length === 0) return;

        const subDone = subTodos.filter(t => t.done).length;

        // Subcategory header
        const subHeader = document.createElement('div');
        subHeader.className = 'subcat-header' + (sub.archived ? ' archived' : '');
        subHeader.innerHTML = `
          <div class="subcat-dot" style="background:${cat.color}"></div>
          <span class="subcat-name">${escHtml(sub.name)}${sub.archived ? ' <span style="font-size:10px;color:var(--text-muted)">(숨김)</span>' : ''}</span>
          <span class="subcat-count">${subDone}/${subTodos.length}</span>
          <button class="subcat-add-btn" data-cat="${sub.id}" title="할일 추가">+</button>
          <button class="subcat-menu-btn" data-subcat="${sub.id}">···</button>
        `;
        body.appendChild(subHeader);

        // Subcategory todos
        const subTodoWrap = document.createElement('div');
        subTodoWrap.className = 'subcat-todos';
        subTodoWrap.dataset.dropCat = sub.id;
        subTodos.forEach(todo => {
          subTodoWrap.appendChild(makeTodoEl(todo, cat));
        });

        // Inline add form for subcategory
        const addForm = makeInlineAddForm(sub.id);
        subTodoWrap.appendChild(addForm);

        body.appendChild(subTodoWrap);
      });

      // Also render direct todos (todos directly under parent, not in subcategory)
      const directTodos = todosForDate
        .filter(t => t.categoryId === cat.id)
        .sort((a, b) => a.order - b.order);
      if (directTodos.length > 0) {
        const directHeader = document.createElement('div');
        directHeader.className = 'subcat-header';
        directHeader.innerHTML = `
          <div class="subcat-dot" style="background:${cat.color}; opacity:0.4"></div>
          <span class="subcat-name">기타</span>
          <span class="subcat-count">${directTodos.filter(t=>t.done).length}/${directTodos.length}</span>
          <button class="subcat-add-btn" data-cat="${cat.id}" title="할일 추가">+</button>
        `;
        body.appendChild(directHeader);
        const directWrap = document.createElement('div');
        directWrap.className = 'subcat-todos';
        directWrap.dataset.dropCat = cat.id;
        directTodos.forEach(todo => directWrap.appendChild(makeTodoEl(todo, cat)));
        const addForm = makeInlineAddForm(cat.id);
        directWrap.appendChild(addForm);
        body.appendChild(directWrap);
      }

    } else {
      // No subcategories — render todos directly (original behavior)
      body.dataset.dropCat = cat.id;
      const catTodos = todosForDate
        .filter(t => t.categoryId === cat.id)
        .sort((a, b) => a.order - b.order);

      if (catTodos.length === 0) {
        body.innerHTML = '<div class="empty-state"><span class="emoji">🌿</span>할일을 추가해보세요</div>';
      }

      catTodos.forEach(todo => {
        body.appendChild(makeTodoEl(todo, cat));
      });

      const addForm = makeInlineAddForm(cat.id);
      body.appendChild(addForm);
    }

    card.appendChild(body);
    area.appendChild(card);
  });

  // Wire add todo buttons (both cat-level and subcat-level)
  area.querySelectorAll('.cat-add-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const catId = btn.dataset.cat;
      const hasSubcats = btn.dataset.hasSubcats === 'true';
      if (hasSubcats) {
        // For categories with subcats, show first subcategory's add form
        const subs = getSubcategories(catId);
        if (subs.length > 0) showInlineAdd(subs[0].id);
      } else {
        showInlineAdd(catId);
      }
    });
  });

  area.querySelectorAll('.subcat-add-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      showInlineAdd(btn.dataset.cat);
    });
  });

  // Wire drag & drop on drop zones
  area.querySelectorAll('[data-drop-cat]').forEach(zone => {
    const targetCatId = zone.dataset.dropCat;
    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', () => {
      zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      if (e.dataTransfer.types.includes('application/cat-id')) return; // 카테고리 드래그 무시
      const todoId = e.dataTransfer.getData('text/plain');
      const todo = data.todos.find(t => t.id === todoId);
      if (!todo) return;
      if (todo.categoryId !== targetCatId) {
        // 다른 카테고리에서 옮겨온 경우
        todo.categoryId = targetCatId;
      }
      // 같은 카테고리든 다른 카테고리든 맨 뒤로 배치
      const siblings = data.todos.filter(t => t.categoryId === targetCatId && t.date === selectedDate && t.id !== todo.id);
      todo.order = siblings.reduce((m, t) => Math.max(m, t.order), -1) + 1;
      saveData();
      renderTodos();
      renderCalendar();
    });
  });

  // Wire category menu buttons
  area.querySelectorAll('.cat-menu-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      showCatCtxMenu(e, btn.dataset.cat);
    });
  });

  // Wire subcategory menu buttons
  area.querySelectorAll('.subcat-menu-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      showSubcatCtxMenu(e, btn.dataset.subcat);
    });
  });

  // Wire add subcategory bars
  area.querySelectorAll('.add-subcat-bar').forEach(bar => {
    bar.addEventListener('click', () => {
      const parentId = bar.dataset.parentId;
      const form = document.getElementById(`add-subcat-form-${parentId}`);
      if (form) {
        form.classList.add('active');
        form.querySelector('.subcat-name-input').value = '';
        form.querySelector('.subcat-name-input').focus();
      }
    });
  });

  // Wire subcategory creation forms
  area.querySelectorAll('.subcat-inline-add').forEach(form => {
    const parentId = form.id.replace('add-subcat-form-', '');
    const input = form.querySelector('.subcat-name-input');
    const saveBtn = form.querySelector('.btn-save');
    const cancelBtn = form.querySelector('.btn-cancel');

    saveBtn.addEventListener('click', () => {
      const name = input.value.trim();
      if (!name) return;
      addSubcategory(parentId, name);
      form.classList.remove('active');
    });

    cancelBtn.addEventListener('click', () => form.classList.remove('active'));

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveBtn.click();
      if (e.key === 'Escape') cancelBtn.click();
    });
  });
}

function makeTodoEl(todo, cat) {
  const item = document.createElement('div');
  item.className = 'todo-item';
  item.dataset.id = todo.id;
  item.draggable = true;

  item.addEventListener('dragstart', (e) => {
    e.dataTransfer.setData('text/plain', todo.id);
    e.dataTransfer.setData('application/todo-id', todo.id);
    item.classList.add('dragging');
  });
  item.addEventListener('dragend', () => {
    item.classList.remove('dragging');
    document.querySelectorAll('.drag-over,.todo-drop-above,.todo-drop-below').forEach(el => {
      el.classList.remove('drag-over', 'todo-drop-above', 'todo-drop-below');
    });
  });
  item.addEventListener('dragover', (e) => {
    if (!e.dataTransfer.types.includes('application/todo-id')) return;
    e.preventDefault();
    e.stopPropagation();
    const rect = item.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    item.classList.remove('todo-drop-above', 'todo-drop-below');
    if (e.clientY < midY) {
      item.classList.add('todo-drop-above');
    } else {
      item.classList.add('todo-drop-below');
    }
  });
  item.addEventListener('dragleave', () => {
    item.classList.remove('todo-drop-above', 'todo-drop-below');
  });
  item.addEventListener('drop', (e) => {
    if (!e.dataTransfer.types.includes('application/todo-id')) return;
    e.preventDefault();
    e.stopPropagation();
    item.classList.remove('todo-drop-above', 'todo-drop-below');
    const draggedId = e.dataTransfer.getData('application/todo-id');
    if (draggedId === todo.id) return;
    const rect = item.getBoundingClientRect();
    const above = e.clientY < rect.top + rect.height / 2;
    reorderTodo(draggedId, todo, above);
  });

  // 기한 지난 미완료 항목 판별
  const isExpired = !todo.done && todo.date < todayStr();

  const checkColor = todo.done ? cat.color : 'transparent';
  const borderColor = todo.done ? cat.color : 'var(--border)';

  let metaHtml = '';
  const durHtml = renderDurationBadge(todo);
  if (durHtml) metaHtml += durHtml;
  if (todo.scheduledTime) metaHtml += `<span class="todo-time">🕐 ${formatTime(todo.scheduledTime)}</span>`;

  // 미룬 일수
  if (todo.createdDate && todo.date !== todo.createdDate && !todo.done && !isExpired) {
    const created = new Date(todo.createdDate);
    const current = new Date(todo.date);
    const days = Math.round((current - created) / (1000 * 60 * 60 * 24));
    if (days > 0) {
      metaHtml += `<span class="todo-delayed">D+${days}</span>`;
    }
  }

  // 기한 만료 표시
  if (isExpired) {
    item.classList.add('expired');
  }

  const textClass = todo.done ? 'done' : (isExpired ? 'expired' : '');

  item.innerHTML = `
    <div class="todo-check ${todo.done ? 'checked' : ''}" style="background:${checkColor}; border-color:${borderColor}; --cat-color:${cat.color}" data-id="${todo.id}"></div>
    <div class="todo-content">
      <span class="todo-text ${textClass}">${escHtml(todo.text)}</span>
      ${metaHtml ? `<div class="todo-meta">${metaHtml}</div>` : ''}
    </div>
    <button class="todo-menu-btn" data-id="${todo.id}">···</button>
  `;

  // Check toggle
  item.querySelector('.todo-check').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleTodo(todo.id, e.currentTarget);
  });

  // Menu
  item.querySelector('.todo-menu-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    showCtxMenu(e, todo.id);
  });

  return item;
}

// ─── CRUD ─────────────────────────────────────────────────
function toggleTodo(id, el) {
  const todo = data.todos.find(t => t.id === id);
  if (!todo) return;
  const wasNotDone = !todo.done;
  todo.done = !todo.done;

  // 완료 전환 시: 실제시간 입력 프롬프트 (예상시간 있고 실제시간 없을 때만)
  if (wasNotDone && todo.estimatedTime && !todo.actualTime) {
    showActualTimePrompt(todo);
  }

  saveData();
  el.classList.add('check-pop');
  el.addEventListener('animationend', () => el.classList.remove('check-pop'), { once: true });
  // Re-render
  renderTodos();
  renderCalendar();
}

// 작은 프롬프트 (토스트 형식): 실제 걸린 시간 빠르게 입력
function showActualTimePrompt(todo) {
  // 기존 토스트 제거
  const existing = document.getElementById('actual-time-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'actual-time-toast';
  toast.className = 'actual-toast';
  toast.innerHTML = `
    <div class="at-title">실제로 얼마나 걸렸어요?</div>
    <div class="at-sub">예상: ${todo.estimatedTime}</div>
    <div class="at-row">
      <button class="at-preset" data-val="${todo.estimatedTime}">예상대로</button>
      <input type="text" class="at-input" placeholder="예: 1h 30m">
      <button class="at-save">저장</button>
    </div>
    <div class="at-row at-presets-row">
      <button class="at-preset" data-val="15m">15m</button>
      <button class="at-preset" data-val="30m">30m</button>
      <button class="at-preset" data-val="1h">1h</button>
      <button class="at-preset" data-val="1h 30m">1h 30m</button>
      <button class="at-preset" data-val="2h">2h</button>
      <button class="at-skip">나중에</button>
    </div>
  `;
  document.body.appendChild(toast);

  const input = toast.querySelector('.at-input');
  setTimeout(() => input.focus(), 50);

  const save = (val) => {
    if (val) {
      const normalized = formatDuration(parseDuration(val));
      if (normalized) {
        todo.actualTime = normalized;
        saveData();
        renderTodos();
      }
    }
    toast.remove();
  };

  toast.querySelector('.at-save').addEventListener('click', () => save(input.value.trim()));
  toast.querySelector('.at-skip').addEventListener('click', () => toast.remove());
  toast.querySelectorAll('.at-preset').forEach(btn => {
    btn.addEventListener('click', () => save(btn.dataset.val));
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') save(input.value.trim());
    if (e.key === 'Escape') toast.remove();
  });
}

function addTodo(catId, text, estimatedTime, scheduledTime) {
  const catTodos = data.todos.filter(t => t.categoryId === catId && t.date === selectedDate);
  const maxOrder = catTodos.reduce((m, t) => Math.max(m, t.order), -1);
  data.todos.push({
    id: uid(),
    categoryId: catId,
    text,
    date: selectedDate,
    done: false,
    estimatedTime: estimatedTime || null,
    actualTime: null,
    scheduledTime: scheduledTime || null,
    order: maxOrder + 1,
    createdDate: selectedDate
  });
  saveData();
  renderTodos();
  renderCalendar();
}

function deleteTodo(id) {
  data.todos = data.todos.filter(t => t.id !== id);
  saveData();
  renderTodos();
  renderCalendar();
}

function editTodo(id, text, estimatedTime, actualTime, scheduledTime) {
  const todo = data.todos.find(t => t.id === id);
  if (!todo) return;
  todo.text = text;
  todo.estimatedTime = estimatedTime || null;
  todo.actualTime = actualTime || null;
  todo.scheduledTime = scheduledTime || null;
  saveData();
  renderTodos();
}

// ─── Subcategory CRUD ────────────────────────────────────
function addSubcategory(parentId, name) {
  const siblings = getSubcategories(parentId);
  const maxOrder = siblings.reduce((m, c) => Math.max(m, c.order), -1);
  data.categories.push({
    id: uid(),
    name,
    icon: null,
    color: null,
    order: maxOrder + 1,
    parentId
  });
  saveData();
  renderTodos();
}

function deleteSubcategory(id) {
  // Move todos to parent or delete them
  data.todos = data.todos.filter(t => t.categoryId !== id);
  data.categories = data.categories.filter(c => c.id !== id);
  saveData();
  renderTodos();
  renderCalendar();
}

function renameSubcategory(id, newName) {
  const cat = data.categories.find(c => c.id === id);
  if (cat) {
    cat.name = newName;
    saveData();
    renderTodos();
  }
}

let editingTodoId = null;

function buildChipList(container, currentValue) {
  container.innerHTML = '';
  const selected = currentValue || '';
  // 프리셋 + 비표준 값(리사이즈로 생긴 '1h 45m' 등) 있으면 끝에 추가
  const items = [...DURATION_PRESETS];
  if (selected && !items.some(p => p.value === selected)) {
    items.push({ value: selected, label: selected, custom: true });
  }
  items.forEach(it => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'chip' + (it.value === selected ? ' selected' : '') + (it.custom ? ' custom' : '');
    chip.textContent = it.label;
    chip.dataset.value = it.value;
    chip.addEventListener('click', () => {
      container.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      container.dataset.value = it.value;
    });
    container.appendChild(chip);
  });
  container.dataset.value = selected;
}

  const estimatedTime = document.getElementById('edit-estimated-chips').dataset.value || null;
  const actualTime = document.getElementById('edit-actual-chips').dataset.value || null;
  const time = getTimePickerValue(
    document.getElementById('edit-time-ampm'),
    document.getElementById('edit-time-hour'),
    document.getElementById('edit-time-min')
  );
  editTodo(editingTodoId, text, estimatedTime, actualTime, time);
  document.getElementById('edit-modal').classList.remove('show');
  editingTodoId = null;
});

document.getElementById('edit-cancel').addEventListener('click', () => {
  document.getElementById('edit-modal').classList.remove('show');
  editingTodoId = null;
});

document.getElementById('edit-modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('edit-modal')) {
    document.getElementById('edit-modal').classList.remove('show');
  }
});

// ─── Add Category ─────────────────────────────────────────
let selectedEmoji = EMOJIS[0];
let selectedColor = COLORS[0];

function buildCatModal() {
  const emojiGrid = document.getElementById('emoji-grid');
  emojiGrid.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-option' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.addEventListener('click', () => {
      selectedEmoji = e;
      emojiGrid.querySelectorAll('.emoji-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
    emojiGrid.appendChild(btn);
  });

  const colorGrid = document.getElementById('color-grid');
  colorGrid.innerHTML = '';
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-option' + (c === selectedColor ? ' selected' : '');
    btn.style.background = c;
    btn.addEventListener('click', () => {
      selectedColor = c;
      colorGrid.querySelectorAll('.color-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
    colorGrid.appendChild(btn);
  });
}

document.getElementById('add-cat-btn').addEventListener('click', () => {
  editingCatId = null;
  selectedEmoji = EMOJIS[0];
  selectedColor = COLORS[0];
  document.getElementById('cat-name-input').value = '';
  document.getElementById('cat-modal-title').textContent = '카테고리 추가';
  buildCatModal();
  document.getElementById('cat-modal').classList.add('show');
  setTimeout(() => document.getElementById('cat-name-input').focus(), 100);
});

document.getElementById('cat-save').addEventListener('click', () => {
  const name = document.getElementById('cat-name-input').value.trim();
  if (!name) return;

  if (editingCatId) {
    // Edit existing category
    const cat = data.categories.find(c => c.id === editingCatId);
    if (cat) {
      cat.name = name;
      cat.icon = selectedEmoji;
      cat.color = selectedColor;
    }
    editingCatId = null;
  } else {
    // Add new category
    const maxOrder = data.categories.reduce((m, c) => Math.max(m, c.order), -1);
    data.categories.push({
      id: uid(),
      name,
      icon: selectedEmoji,
      color: selectedColor,
      order: maxOrder + 1,
      parentId: null
    });
  }
  saveData();
  document.getElementById('cat-modal').classList.remove('show');
  renderTodos();
});

document.getElementById('cat-cancel').addEventListener('click', () => {
  document.getElementById('cat-modal').classList.remove('show');
});

document.getElementById('cat-modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('cat-modal')) {
    document.getElementById('cat-modal').classList.remove('show');
  }
});

document.getElementById('cal-prev').addEventListener('click', () => {

// ─── Time Picker (오전/오후 + 시 + 분) ──────────────────
function setupTimePicker(ampmEl, hourEl, minEl, value) {
  // Build hour options (1~12)
  hourEl.innerHTML = '';
  for (let h = 1; h <= 12; h++) {
    const opt = document.createElement('option');
    opt.value = h;
    opt.textContent = h;
    hourEl.appendChild(opt);
  }
  // Build min options (00, 15, 30, 45)
  minEl.innerHTML = '';
  [0, 15, 30, 45].forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = String(m).padStart(2, '0');
    minEl.appendChild(opt);
  });

  // Set values from HH:MM string
  if (value) {
    const [hh, mm] = value.split(':').map(Number);
    ampmEl.value = hh < 12 ? '오전' : '오후';
    hourEl.value = hh % 12 === 0 ? 12 : hh % 12;
    minEl.value = Math.floor(mm / 15) * 15; // snap to nearest 15
    hourEl.disabled = false;
    minEl.disabled = false;
  } else {
    ampmEl.value = '';
    hourEl.disabled = true;
    minEl.disabled = true;
  }

  // Toggle hour/min enabled on ampm change
  ampmEl.onchange = () => {
    const enabled = ampmEl.value !== '';
    hourEl.disabled = !enabled;
    minEl.disabled = !enabled;
    if (enabled && !hourEl.value) hourEl.value = 12;
    if (enabled && !minEl.value) minEl.value = 0;
  };
}

function getTimePickerValue(ampmEl, hourEl, minEl) {
  if (!ampmEl.value) return null;
  let h = parseInt(hourEl.value);
  const m = parseInt(minEl.value);
  if (ampmEl.value === '오전') {
    if (h === 12) h = 0;
  } else {
    if (h !== 12) h += 12;
  }
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

// ─── HTML Escape ──────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────
async function initApp() {
  await loadData();
  console.log('loadData OK, useApi:', useApi, 'categories:', data.categories.length);
  initCalendar();
  renderCalendar();
  renderTodos();
  wireTimetableGridDrop();
  hideLogin();
  console.log('Init complete');
}

(async () => {
  try {
    if (!isAuthEnabled) {
      // 로컬 개발 모드 (Supabase 미설정)
      document.getElementById('loading-overlay').classList.add('hidden');
      await initApp();
      return;
    }

    // 세션 확인
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      currentSession = session;
      updateUserUI(session.user);
      await initApp();
    } else {
      showLogin();
    }

    // 인증 상태 변경 리스너
    supabaseClient.auth.onAuthStateChange(async (event, session) => {
      console.log('Auth event:', event);
      currentSession = session;
      if (event === 'SIGNED_IN' && session) {
        updateUserUI(session.user);
        await initApp();
      } else if (event === 'SIGNED_OUT') {
        showLogin();
        updateUserUI(null);
      }
    });
  } catch(e) {
    console.error('Init error:', e);
    document.getElementById('loading-overlay').classList.add('hidden');
  }
})();
</script>
